      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#charge_information"
            show_header: false
          - type: heading
            icon: mdi:battery-clock
            heading: Planerad laddning
            heading_style: title
          - type: custom:vertical-stack-in-card
            cards:
              - type: conditional
                conditions:
                  - condition: state
                    entity: sensor.sem_battery_charging_interval_next
                    state: "2"
                card:
                  type: custom:vertical-stack-in-card
                  cards:
                    - type: markdown
                      content: >-
                        {% set raw =
                        states('sensor.sem_battery_charge_window_cheapest_2') %}

                        {% set start, end = (raw.split(' - ') if raw and ' - '
                        in raw else [None, None]) %}


                        {% set energy =
                        states('sensor.sem_battery_charge_energy_2_1b') |
                        float(0) %}

                        {% set battery_capacity =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','battery_capacity')
                        | float(0) %}

                        {% set estimated_sun =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','estimated_energy_sun_interval')
                        | float(0) %}

                        {% set estimated_no_sun =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','estimated_energy_no_sun_interval')
                        | float(0) %}

                        {% set solar_forecast =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','estimated_solar_energy')
                        | float(0) %}

                        {% set solar_surplus =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','solar_surplus')
                        | float(0) %}

                        {% set supercheap =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','supercheap_charge')
                        | float(0) %}

                        {% set extra = states('input_number.extra_2') | float(0)
                        %}

                        {% set adjustment_factor =
                        state_attr('sensor.sem_battery_charge_energy_2_1b','adjustment_factor_solar_energy')
                        | float(0) %}

                        {% set battery_max =
                        states('input_number.sem_battery_total_capacity_kwh') |
                        float(0) %}


                        {% set override =
                        states('input_select.sem_battery_charge_override_2_1b')
                        %}

                        {% set profit =
                        state_attr('sensor.sem_battery_charge_energy_2_1b',
                        'profit') | float(-1) %}

                        {% set profit_threshold =
                        states('input_number.sem_charge_profit_threshold') |
                        float(0.20) %}

                        {% set avg_price =
                        state_attr('sensor.sem_battery_charge_energy_2_1b',
                        'avg_window') | float(999) %}


                        {# --- Beslut om laddning --- #}

                        {% set ns = namespace(should_charge=true, reasons=[]) %}


                        {% if override == 'Ladda' %}
                          {% set ns.should_charge = true %}
                          {% set ns.reasons = ns.reasons + ['Beslut av användaren'] %}
                        {% elif override == 'Ladda ej' %}
                          {% set ns.should_charge = false %}
                          {% set ns.reasons = ns.reasons + ['Beslut av användaren'] %}
                        {% else %}
                          {% if energy <= 0 %}
                            {% set ns.should_charge = false %}
                            {% set ns.reasons = ns.reasons + ['Inget laddningsbehov'] %}
                          {% elif profit >= profit_threshold or avg_price <= supercheap %}
                            {% set ns.should_charge = true %}
                            {% set ns.reasons = ns.reasons + ['Elpriset eller arbitrage uppfyller vinstkravet'] %}
                          {% else %}
                            {% set ns.should_charge = false %}
                            {% set ns.reasons = ns.reasons + ['Vinstkravet uppfylls inte'] %}
                          {% endif %}
                        {% endif %}


                        {# --- Samma beräkningar som sensorn --- #}

                        {% set solar_after_house = max(0, (solar_forecast *
                        adjustment_factor) - estimated_sun) %}

                        {% set energy_needed_until_next_window =
                        estimated_no_sun + estimated_sun - solar_surplus %}


                        {% if battery_capacity >=
                        energy_needed_until_next_window %}
                          {% set net_charge_needed = 0 %}
                        {% else %}
                          {% set battery_deficit = max(0, battery_max - battery_capacity) %}
                          {% set net_charge_needed = max(0, battery_deficit - solar_after_house) %}
                        {% endif %}


                        {% set total_energy = net_charge_needed + supercheap +
                        extra %}


                        <b><center>🕒 Planerad laddning: {% if start and end
                        %}{{ start[11:16] }}–{{ end[11:16] }}{% else %}<i>Ingen
                        giltig laddningstid</i>{% endif %}</center></b>

                        <center>🔋 Batterikapacitet: {{ battery_capacity |
                        round(2) }} kWh</center>

                        <center>⚡ Laddningsbehov: {{ energy | round(2) }}
                        kWh</center>


                        {% if ns.should_charge %}


                        <b><center>📝 Beräkning av laddningsbehovet</center></b>

                        <center>
                          Energibehov fram till nästa laddningsfönster:<br>
                          ({{ estimated_no_sun }} + {{ estimated_sun }} − {{ solar_surplus }}) =
                          {{ energy_needed_until_next_window | round(2) }}
                          </center>
                          <br>
                          <center>
                          Batteriets underskott justerat för solel:<br>
                          ({{ battery_max }} − {{ battery_capacity }}) − {{ solar_after_house | round(2) }} =
                          {{ net_charge_needed | round(2) }}
                          </center>
                          <br>
                          <center>
                          Total laddning:<br>
                          {{ net_charge_needed | round(2) }} + {{ supercheap }} + {{ extra }} =
                          {{ total_energy | round(2) }}
                          </center>

                        <b><center>🌙 Energiöversikt fram till nästa
                        laddningsfönster</center></b>

                        <center>☀️ Energibehov under soltimmar: {{ estimated_sun
                        }} kWh</center>
                          <center>🌙 Energibehov under solfria timmar: {{ estimated_no_sun }} kWh</center>
                          <center>🔆 Solelsprognos: {{ solar_forecast | round(2) }} kWh</center>
                          <center>🔆 Solel tillgänglig för batteriet: {{ solar_after_house | round(2) }} kWh</center>
                          <center>🔆 Överskott av solel: {{ solar_surplus | round(2) }} kWh</center>
                          <center>💰 Extra laddning vid superbillig el: {{ supercheap }} kWh</center>

                        {% else %}

