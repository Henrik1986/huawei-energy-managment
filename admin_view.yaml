type: sections
max_columns: 3
title: Smart Energy System
path: smart-energy-system
icon: mdi:dots-circle
sections:
  - type: grid
    cards:
      - type: heading
        heading: Energiflöde
        heading_style: subtitle
        icon: mdi:home-lightning-bolt
        badges: []
      - type: custom:energy-flow-card-plus
        entities:
          grid:
            entity:
              consumption: sensor.sem_import
              production: sensor.sem_export
          solar:
            entity: sensor.sem_solar_production
            display_zero_state: true
          battery:
            entity:
              consumption: sensor.batteries_day_discharge
              production: sensor.batteries_day_charge
          individual1:
            entity: sensor.sem_ev_charge
            name: Laddbox
            color: teal
        clickable_entities: false
        display_zero_lines: true
        use_new_flow_rate_model: false
        energy_date_selection: false
        wh_decimals: 2
        kwh_decimals: 1
        min_flow_rate: 1
        max_flow_rate: 6
        max_expected_energy: 2000
        min_expected_energy: 10
        wh_kwh_threshold: 1000
        grid_options:
          columns: 60
          rows: auto
        column_span: 2
      - type: heading
        heading: Systemets driftplan
        heading_style: subtitle
        icon: mdi:calendar-clock
        badges:
          - type: entity
            show_state: true
            show_icon: true
            entity: sensor.sem_nordpool_active
            name: Elpris
            icon: mdi:transmission-tower-import
            state_content:
              - name
              - state
        tap_action:
          action: navigate
          navigation_path: "#system_plan"
      - type: custom:vertical-stack-in-card
        cards:
          - type: custom:apexcharts-card
            update_interval: 1 min
            graph_span: 48h
            cache: false
            span:
              start: day
              offset: +0H
            header:
              title: Systemets driftplan
              show: false
              show_states: false
              colorize_states: true
            hours_12: false
            stacked: false
            experimental:
              color_threshold: true
            yaxis:
              - id: spotpris
                opposite: false
                show: true
                decimals: 1
                min: 0
                apex_config:
                  title:
                    text: Elpris (SEK/kWh)
              - id: solar_power
                opposite: true
                show: true
                apex_config:
                  title:
                    text: Solel (kWh)
              - id: charge/expensive
                opposite: true
                show: false
            apex_config:
              chart:
                height: 320
                animations:
                  enabled: true
                  easing: easeinout
                  speed: 800
                  animateGradually:
                    enabled: true
                    delay: 150
              legend:
                show: true
                floating: false
                offsetY: 5
                position: bottom
                fontSize: 10px
              tooltip:
                enabled: true
              xaxis:
                labels:
                  show: true
                  rotate: 0
                  rotateAlways: true
                  logarithmic: false
                  datetimeUTC: false
              stroke:
                width: 1
              plotOptions:
                candlestick:
                  colors:
                    upward: "#00B746"
                    downward: "#EF403C"
                  wick:
                    useFillColor: true
            all_series_config:
              show:
                legend_value: false
                datalabels: false
                in_brush: false
              float_precision: 3
              invert: false
              fill_raw: last
            now:
              show: true
              label: NU
              color: red
            series:
              - entity: sensor.sem_solar_forecast
                yaxis_id: solar_power
                data_generator: >
                  return entity.attributes.sem.watt_hours_period.map((entry) =>
                  {
                    const value = entry.values / 1000;
                    if (value <= 0) {
                      return [new Date(entry.date), null];
                    }
                    return [new Date(entry.date), value];
                  });
                name: Solel
                extend_to: false
                type: area
                color: orange
                opacity: 0.7
                stroke_width: 3
                color_threshold:
                  - value: 0
                    color: "#fff9c4"
                  - value: 5
                    color: "#ffeb3b"
                  - value: 15
                    color: "#fbc02d"
              - entity: sensor.sem_nordpool_active
                yaxis_id: spotpris
                type: area
                name: Idag
                opacity: 0.7
                color: grey
                extend_to: false
                data_generator: >
                  const data = entity.attributes.raw_today.map((start, index) =>
                  {
                    return [new Date(start["start"]).getTime(), start["value"]];
                  });

                  const last = entity.attributes.raw_today.slice(-1)[0];

                  const lastTime = new Date(last["start"]).getTime();

                  data.push([lastTime + 3600000, last["value"]]); // 

                  return data;
                color_threshold:
                  - value: -1
                    color: 1E90FF
                  - value: 0.5
                    color: "008000"
                  - value: 1
                    color: DAA520
                  - value: 2
                    color: FF0000
                show:
                  legend_value: false
                  datalabels: false
                  extremas: true
                  in_brush: false
                  in_legend: false
              - entity: sensor.sem_nordpool_active
                yaxis_id: spotpris
                name: Imorgon
                type: area
                opacity: 0.7
                color: grey
                data_generator: >
                  const data = entity.attributes.raw_tomorrow.map((start, index)
                  => {
                    return [new Date(start["start"]).getTime(), start["value"]];
                  });

                  const last = entity.attributes.raw_tomorrow.slice(-1)[0];
                  const lastTime = new Date(last["start"]).getTime();

                  data.push([lastTime + 3600000, last["value"]]);

                  return data;
                color_threshold:
                  - value: -1
                    color: 1E90FF
                  - value: 0.5
                    color: "008000"
                  - value: 1
                    color: DAA520
                  - value: 2
                    color: FF0000
                show:
                  legend_value: false
                  datalabels: false
                  extremas: true
                  in_brush: false
                  in_legend: false
              - entity: sensor.sem_battery_charge_window_cheapest_1a
                yaxis_id: charge/expensive
                name: Laddningsfönster
                opacity: 0.7
                color: "#00406c"
                type: area
                data_generator: |
                  const data = [];
                  const sensorData = entity.state.split(' - ');
                  function parseLocalTime(str) {
                    const parts = str.split(/[- :T]/).map(Number);
                    const date = new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4]);
                    return date.getTime();
                  }
                  const startTime = parseLocalTime(sensorData[0]);
                  const endTime = parseLocalTime(sensorData[1]);
                  data.push([startTime, 1]);
                  data.push([startTime, 1]);
                  data.push([endTime, 1]);
                  data.push([endTime, 0]);
                  return data;
                show:
                  legend_value: false
                  datalabels: false
                  extremas: false
                  in_brush: false
                  in_legend: true
