                    opposite: true
                    show: false
                apex_config:
                  chart:
                    height: 320
                    animations:
                      enabled: true
                      easing: easeinout
                      speed: 800
                      animateGradually:
                        enabled: true
                        delay: 150
                  legend:
                    show: true
                    floating: false
                    offsetY: 5
                    position: bottom
                    fontSize: 10px
                  tooltip:
                    enabled: true
                  xaxis:
                    labels:
                      show: true
                      rotate: 0
                      rotateAlways: true
                      logarithmic: false
                      datetimeUTC: false
                  stroke:
                    width: 1
                  plotOptions:
                    candlestick:
                      colors:
                        upward: "#00B746"
                        downward: "#EF403C"
                      wick:
                        useFillColor: true
                all_series_config:
                  show:
                    legend_value: false
                    datalabels: false
                    in_brush: false
                  float_precision: 3
                  invert: false
                  fill_raw: last
                now:
                  show: true
                  label: NU
                  color: red
                series:
                  - entity: sensor.sem_battery_charge_window_cheapest_1a
                    yaxis_id: charge/expensive
                    name: Laddningsfönster
                    opacity: 0.7
                    color: "#00406c"
                    type: area
                    data_generator: |
                      const data = [];
                      const sensorData = entity.state.split(' - ');
                      function parseLocalTime(str) {
                        const parts = str.split(/[- :T]/).map(Number);
                        const date = new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4]);
                        return date.getTime();
                      }
                      const startTime = parseLocalTime(sensorData[0]);
                      const endTime = parseLocalTime(sensorData[1]);
                      data.push([startTime, 1]);
