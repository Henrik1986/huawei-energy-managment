                    state: "1"
                card:
                  type: custom:vertical-stack-in-card
                  cards:
                    - type: markdown
                      content: >-
                        {% set raw =
                        states('sensor.sem_battery_charge_window_cheapest_1a')
                        %}

                        {% set start, end = (raw.split(' - ') if raw and ' - '
                        in raw else [None, None]) %}


                        {% set energy =
                        states('sensor.sem_battery_charge_energy_1a_2') |
                        float(0) %}

                        {% set battery_capacity =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','battery_capacity')
                        | float(0) %}

                        {% set estimated_sun =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','estimated_energy_sun_interval')
                        | float(0) %}

                        {% set estimated_no_sun =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','estimated_energy_no_sun_interval')
                        | float(0) %}

                        {% set solar_forecast =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','estimated_solar_energy')
                        | float(0) %}

                        {% set solar_surplus =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','solar_surplus')
                        | float(0) %}

                        {% set supercheap =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','supercheap_charge')
                        | float(0) %}

                        {% set extra = states('input_number.extra_1') | float(0)
                        %}

                        {% set adjustment_factor =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','adjustment_factor_solar_energy')
                        | float(0) %}

                        {% set battery_max =
                        states('input_number.sem_battery_total_capacity_kwh') |
                        float(0) %}

                        {% set battery_solar_enough =
                        state_attr('sensor.sem_battery_charge_energy_1a_2','battery_solar_enough_today')
                        %}

                        {% set profit =
                        state_attr('sensor.sem_battery_charge_energy_1a_2',
                        'profit') | float(-1) %}

                        {% set profit_threshold =
                        states('input_number.sem_charge_profit_threshold') |
                        float(0.20) %}

                        {% set avg_price =
                        state_attr('sensor.sem_battery_charge_energy_1a_2',
                        'avg_window') | float(999) %}

                        {% set override =
                        states('input_select.sem_battery_charge_override_1a_2')
                        %}


                        {% set ns = namespace(should_charge=true, reasons=[]) %}


                        {# Manuell override #}

                        {% if override == 'Ladda' %}
                          {% set ns.should_charge = true %}
                          {% set ns.reasons = ns.reasons + ['Beslut av användaren'] %}
                        {% elif override == 'Ladda ej' %}
                          {% set ns.should_charge = false %}
                          {% set ns.reasons = ns.reasons + ['Beslut av användaren'] %}
                        {% else %}
                          {% if battery_solar_enough in [true,'true','True'] %}
                            {% set ns.should_charge = false %}
                            {% set ns.reasons = ns.reasons + ['Solelen beräknas fylla batteriet'] %}
                          {% elif energy <= 0 %}
                            {% set ns.should_charge = false %}
                            {% set ns.reasons = ns.reasons + ['Inget laddningsbehov'] %}
                          {% elif profit >= profit_threshold or avg_price <= supercheap %}
                            {% set ns.should_charge = true %}
                            {% set ns.reasons = ns.reasons + ['Elpriset eller arbitrage uppfyller vinstkravet'] %}
                          {% else %}
                            {% set ns.should_charge = false %}
                            {% set ns.reasons = ns.reasons + ['Vinstkravet uppfylls inte'] %}
                          {% endif %}
                        {% endif %}


                        {# Beräkningar som tidigare #}

                        {% set solar_after_house = max(0, (solar_forecast *
                        adjustment_factor) - estimated_sun) %}

                        {% set energy_needed_until_next_window =
                        estimated_no_sun + estimated_sun - solar_surplus %}


                        {% if battery_capacity >=
                        energy_needed_until_next_window %}
                          {% set net_charge_needed = 0 %}
                        {% else %}
                          {% set battery_deficit = max(0, battery_max - battery_capacity) %}
                          {% set net_charge_needed = max(0, battery_deficit - solar_after_house) %}
