        icon: mdi:battery-clock
        tap_action:
          action: navigate
          navigation_path: "#charge_information"
      - type: custom:vertical-stack-in-card
        cards:
          - type: conditional
            conditions: []
            card:
              type: conditional
              conditions:
                - condition: state
                  entity: sensor.sem_battery_charging_interval_next
                  state: "2"
              card:
                type: custom:vertical-stack-in-card
                cards:
                  - type: markdown
                    content: |2
                        {% set interval = states('sensor.sem_battery_charge_window_cheapest_2') %}
                        {% set energy = states('sensor.sem_battery_charge_energy_2_1b') %}
                        {% set sc = state_attr('sensor.sem_battery_charge_energy_2_1b','should_charge') | bool %}
                        {% set supercheap = state_attr('sensor.sem_battery_charge_energy_2_1b','supercheap_charge') %}
                        
                        {% if ' - ' in interval %}
                          {% set start_str, end_str = interval.split(' - ') %}
                          {% set start_time = start_str | as_datetime %}
                          {% set end_time = end_str | as_datetime %}
                          
                        🕛Klockan: {{ start_time.strftime('%H:%M') }} - {{ end_time.strftime('%H:%M') }}{% if sc %}
                        ⚡Laddningsbeslut: Ladda
                        {% else %}
                        ❌ Laddningsbeslut: Ladda ej
                        {% endif %}🔋Beräknad laddning: {{ energy }} kWh
                        💰Extra superbillig laddning: {{ supercheap }} kWh{% if is_state('input_boolean.sem_interval_2', 'on') %}
                        ✅Status: Laddar
                        {% else %}
                        💤Status: Inaktiv
                        {% endif %}

                        {% else %}
                          Ingen tid tillgänglig  
                        {% endif %}
                    tap_action:
                      action: navigate
                      navigation_path: "#settings"
          - type: conditional
            conditions: []
            card:
              type: conditional
              conditions:
                - condition: state
                  entity: sensor.sem_battery_charging_interval_next
                  state: "1"
              card:
                type: custom:vertical-stack-in-card
                cards:
                  - type: markdown
                    content: >-
                      {% set interval =
                      states('sensor.sem_battery_charge_window_cheapest_1a') %}
                      {% set energy =
                      states('sensor.sem_battery_charge_energy_1a_2') %} {% set
                      sc =
                      state_attr('sensor.sem_battery_charge_energy_1a_2','should_charge')
                      | bool %} {% set supercheap =
                      state_attr('sensor.sem_battery_charge_energy_1a_2','supercheap_charge')
                      %}

                      {% if ' - ' in interval %}
                        {% set start_str, end_str = interval.split(' - ') %}
                        {% set start_time = start_str | as_datetime %}
                        {% set end_time = end_str | as_datetime %}

                      🕐Klockan: {{ start_time.strftime('%H:%M') }} - {{
                      end_time.strftime('%H:%M') }}

                      {% if sc %} ⚡Laddningsbeslut: Ladda {% else %} ❌
                      Laddningsbeslut: Ladda ej {% endif %}

                      🔋Beräknad laddning: {{ energy }} kWh  

                      💰Extra superbillig laddning: {{ supercheap }} kWh  

                      {% if is_state('input_boolean.sem_interval_1a', 'on') %}
                      ✅Status: Laddar {% else %} 💤Status: Inaktiv {% endif %}

                      {% else %} Ingen tid tillgänglig {% endif %}
                    tap_action:
                      action: navigate
                      navigation_path: "#settings"
            grid_options:
              columns: 12
              rows: 1
  - type: grid
    cards:
      - type: vertical-stack
        cards:
          - type: custom:bubble-card
            card_type: pop-up
            hash: "#config_1"
            show_header: false
            background_update: false
            width_desktop: 600px
            close_action:
              navigation_path: "#settings"
          - type: custom:vertical-stack-in-card
            cards:
              - type: heading
                icon: ""
                heading_style: title
                heading: Konfiguration
              - type: picture-elements
                elements: []
                image: /api/image/serve/e83b35c09064e00c5f35034371a70519/512x512
                style:
                  top: 5%
                  left: 5%
                  width: 3%
              - type: entities
                entities:
                  - entity: input_text.sem_user_access_code
                    tap_action:
                      action: nothing
                    icon_tap_action:
                      action: nothing
              - type: markdown
                content: >+
                  {% set user_code = states('input_text.sem_user_access_code') |
                  trim %}

                  {% set codes_raw = states('sensor.sem_sys_state') %}

                  {% set codes_list = codes_raw.split(',') | map('trim') | list
                  %}

                  {% if user_code in codes_list %}
                    **AnvändarID**
                    ✅ OK
                  {% else %}
                    **AnvändarID**
                    ❌ Ogiltlig kod
                  {% endif %}



                  {# Lista över entiteter att kontrollera #}

                  {% set e1 = 'sensor.batteries_state_of_capacity' %}

                  {% set e2 = 'input_number.sem_batteries_end_of_discharge_soc'
                  %}

                  {% set e3 = 'sensor.inverter_input_power' %}

                  {% set e4 = 'sensor.power_meter_active_power' %}

                  {% set e5 = 'sensor.batteries_charge_discharge_power' %}

                  {% set e6 = 'select.batteries_working_mode' %}

                  {% set e7 = 'number.batteries_grid_charge_maximum_power' %}

                  {% set e8 = 'number.batteries_maximum_discharging_power' %}


                  {# Hämta states #}

                  {% set s1 = states(e1) %}

                  {% set s2 = states(e2) %}

                  {% set s3 = states(e3) %}

                  {% set s4 = states(e4) %}

                  {% set s5 = states(e5) %}

                  {% set s6 = states(e6) %}

                  {% set s7 = states(e7) %}

                  {% set s8 = states(e8) %}


                  {# Definiera vad som räknas som otillgängligt #}

                  {% set bad = ['unknown', 'unavailable', '', None] %}


                  {# Räkna antal otillgängliga #}

                  {% set cnt =
                    ((s1 in bad) | int) +
                    ((s2 in bad) | int) +
                    ((s3 in bad) | int) +
                    ((s4 in bad) | int) +
                    ((s5 in bad) | int) +
                    ((s6 in bad) | int) +
                    ((s7 in bad) | int) +
                    ((s8 in bad) | int)
                  %}


                  {# Utdatat #}

                  {% if cnt == 0 %}

                  **Huawei**

                  ✅ OK

                  {% else %}

                  **Huawei**

                  ❌ Enheter saknas eller har felaktigt namn ({{ cnt }})

                  {% if s1 in bad %}- {{ e1 }}{% endif %}

                  {% if s2 in bad %}- {{ e2 }}{% endif %}

                  {% if s3 in bad %}- {{ e3 }}{% endif %}

                  {% if s4 in bad %}- {{ e4 }}{% endif %}

                  {% if s5 in bad %}- {{ e5 }}{% endif %}

                  {% if s6 in bad %}- {{ e6 }}{% endif %}

                  {% if s7 in bad %}- {{ e7 }}{% endif %}

                  {% if s8 in bad %}- {{ e8 }}{% endif %}

                  {% endif %}



                  {% if states('weather.smhi_home') not in ['unknown',
                  'unavailable', ''] %}

                  **SMHI**
                    ✅ OK
                  {% else %}

                  **SMHI**
