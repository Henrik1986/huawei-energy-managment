                          <center>🔆 Solel tillgänglig för batteriet: {{ solar_after_house | round(2) }} kWh</center>
                          <center>🔆 Överskott av solel: {{ solar_surplus | round(2) }} kWh</center>
                          <center>💰 Extra laddning vid superbillig el: {{ supercheap }} kWh</center>

                        {% else %}

                          <b><center>ℹ️ Laddning genomförs inte</center></b>
                          <center><i>{{ ns.reasons | join(', ') }}</i></center>

                        {% endif %}
