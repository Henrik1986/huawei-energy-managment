                        I **laddbox** anger du vilken sensor som övervakar
                        laddboxens aktuella läge (om den laddar eller är låst).
                        Under **laddningsläge** fyller du i det läge som
                        motsvarar när laddboxen faktiskt laddar bilen (t.ex
                        charging). Under **urladdningseffekt** fyller du i den
                        effekt (kW) som batteriet ska återgå till efter att
                        elbilen är färdigladdad. Slutlingen anger du den effekt
                        (kW) som batteriet får ladda med från elnätet. 
              - type: custom:vertical-stack-in-card
                cards:
                  - type: heading
                    icon: mdi:flash
                    heading_style: subtitle
                    heading: Laddningsstrategi för elbil och hembatteri
                  - type: entities
                    entities:
                      - entity: input_select.sem_ev_battery_strategy
                        secondary_info: none
                        name: Välj
                      - entity: input_boolean.sem_ev_integrated
                        name: Elbil finns i Home Assistant
                        icon: mdi:car-electric
                  - type: conditional
                    conditions:
                      - condition: state
                        entity: input_boolean.sem_ev_integrated
                        state: "on"
                    card:
                      type: custom:vertical-stack-in-card
