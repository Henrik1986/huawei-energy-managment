          - type: custom:vertical-stack-in-card
            cards: []
        grid_options:
          columns: full
    column_span: 2
  - type: grid
    cards:
      - type: heading
        heading_style: subtitle
        heading: Översikt
        icon: mdi:account-eye
      - type: custom:vertical-stack-in-card
        cards:
          - type: custom:gap-card
            height: 10
          - type: custom:vertical-stack-in-card
            cards:
