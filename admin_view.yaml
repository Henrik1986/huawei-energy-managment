                        kWh</center>


                        {% if ns.should_charge %}


                        <b><center>📝 Beräkning av laddningsbehovet</center></b>

                        <center>Behov fram till nästa laddningsfönster:<br>
                          ({{ estimated_no_sun }} + {{ estimated_sun }} − {{ solar_surplus }}) = {{ energy_needed_until_next_window | round(2) }}
                          </center><br>
                        <center>Batteriets underskott justerat för solel:<br>
                          ( {{ battery_max }} − {{ battery_capacity }}) − {{ solar_after_house | round(2) }} = {{ net_charge_needed | round(2) }}
                          </center>
                          <br>
                          <center>
                          Total laddning:<br>
                          {{ net_charge_needed | round(2) }} + {{ supercheap }} + {{ extra }}
                          </center>

                        <b><center>⚡ Energiöversikt fram till nästa
                        laddningsfönster</center></b>

                        <center>☀️ Energi under soltimmar: {{ estimated_sun }}
                        kWh</center>
                          <center>🌙 Energi under solfria timmar: {{ estimated_no_sun }} kWh</center>
