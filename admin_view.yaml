                        state: "off"
                    card:
                      type: markdown
                      content: >
                        Välj önskad strategi då elbilen och hembatteriet laddas
                        samtidigt.  


                        **Ladda elbil först**: Prioterar laddning av elbilen.
                        När elbilen är laddad kommer hembatteriet att laddas. 


                        **Dela effekt**: Elbilen och hembatteriet kommer att
                        dela på tillgänglig effekt. Har du en lastbalanserare
                        kommer effekten på din laddbox gå ner. Detta kan
                        resultera i att laddningen pausas vid hög effekt.  
                  - type: conditional
