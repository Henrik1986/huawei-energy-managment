              - condition: state
                entity_id: input_boolean.sem_ev_integrated
                state: "off"
            sequence:
              - action: input_select.set_options
                target:
                  entity_id: input_select.sem_ev_battery_strategy
                data:
                  options:
                    - "Ladda elbil först"
                    - "Dela effekt"
              # Säkerställ giltigt val
              - action: input_select.select_option
                target:
                  entity_id: input_select.sem_ev_battery_strategy
                data:
                  option: "Ladda elbil först"
################################################################################
  - alias: "SEM - Waitmode when cheap"
    triggers:
      - trigger: time_pattern
        minutes: "/15"
    condition:
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
          {% set codes_raw = states('sensor.sem_sys_state') %}
          {% if user_code != '' and codes_raw %}
            {% set codes_list = codes_raw.split(',') | map('trim') | list %}
            {{ user_code in codes_list }}
          {% else %}
            false
          {% endif %}
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"

    action:
      - choose:

          #################################################################
          # 1. BILLIGT PRIS → SÄTT BATTERI I VILOLÄGE (0 W URLADDNING)
          #################################################################
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_battery_cheap_mode
                state: "off" 
              - condition: template
                value_template: >
                  {% set now_local = now() | as_local %}

                  {# Interval 1 #}
                  {% set i1 = states('sensor.sem_battery_cheap_interval_2_1a') %}
                  {% set r1 = false %}
                  {% if i1 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i1.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r1 = s <= now_local <= e %}
                    {% else %}
                      {% set r1 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {# Interval 2 #}
                  {% set i2 = states('sensor.sem_battery_cheap_interval_1a_2') %}
                  {% set r2 = false %}
                  {% if i2 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i2.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r2 = s <= now_local <= e %}
                    {% else %}
                      {% set r2 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {{ r1 or r2 }}
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: "0"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sem_battery_cheap_mode


          #################################################################
          # 2A. NORMALPRIS → ÅTERSTÄLL URLADDNINGSEFFEKTER, ELBILEN LADDAR INTE OCH INTE SPAR INNAN PRISTOPP
          #################################################################
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_battery_cheap_mode
                state: "on"
              - condition: state
                entity_id: input_boolean.sem_battery_save
                state: "off"
              - condition: state
                entity_id: input_boolean.sem_ev_charging_protection_status
                state: "off"

              - condition: template
                value_template: >
                  {% set now_local = now() | as_local %}

                  {# Interval 1 #}
                  {% set i1 = states('sensor.sem_battery_cheap_interval_2_1a') %}
                  {% set r1 = false %}
                  {% if i1 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i1.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r1 = s <= now_local <= e %}
                    {% else %}
                      {% set r1 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {# Interval 2 #}
                  {% set i2 = states('sensor.sem_battery_cheap_interval_1a_2') %}
                  {% set r2 = false %}
                  {% if i2 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i2.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r2 = s <= now_local <= e %}
                    {% else %}
                      {% set r2 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {{ not (r1 or r2) }}

            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: "{{ states('input_number.sem_battery_discharge_power_ev_limit') | float * 1000 }}"

              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sem_battery_cheap_mode

          #################################################################
          # 2B. NORMALPRIS MEN BATTERISPAR INNAN PRISTOPP AKTIV → SLÄCK ENDAST CHEAP MODE
          #################################################################
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_battery_cheap_mode
                state: "on"

              - condition: state
                entity_id: input_boolean.sem_battery_save
                state: "on"

              - condition: template
                value_template: >
                  {% set now_local = now() | as_local %}

                  {# Interval 1 #}
                  {% set i1 = states('sensor.sem_battery_cheap_interval_2_1a') %}
                  {% set r1 = false %}
                  {% if i1 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i1.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r1 = s <= now_local <= e %}
                    {% else %}
                      {% set r1 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {# Interval 2 #}
                  {% set i2 = states('sensor.sem_battery_cheap_interval_1a_2') %}
                  {% set r2 = false %}
                  {% if i2 not in ['', 'unknown', 'unavailable'] %}
                    {% set p = i2.split(' - ') %}
                    {% set s = p[0] | trim | as_datetime | as_local %}
                    {% set e = p[1] | trim | as_datetime | as_local %}
                    {% if s <= e %} 
                      {% set r2 = s <= now_local <= e %}
                    {% else %}
                      {% set r2 = now_local >= s or now_local <= e %}
                    {% endif %}
                  {% endif %}

                  {{ not (r1 or r2) }}

            sequence:
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sem_battery_cheap_mode

################################################################################
  - alias: "SEM - Battery use between 12-00"
    triggers:
      - trigger: time_pattern
        minutes: "/15" 
    condition:
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
          {% set codes_raw = states('sensor.sem_sys_state') %}
          {% if user_code != '' and codes_raw %}
            {% set codes_list = codes_raw.split(',') | map('trim') | list %}
            {{ user_code in codes_list }}
          {% else %}
            false
          {% endif %}
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"
      - condition: time
        after: "12:00:00"
        before: "23:59:59"
      - condition: state
        entity_id: input_boolean.sem_battery_cheap_mode
        state: "off"     
    action:
      - choose:
          # PRE-INTERVAL: CONTROL DISCHARGE BATTERY BEFORE BATTERY INTERVAL
          - conditions:
              - condition: template
                value_template: >
                  {% set raw = states('sensor.sem_battery_use_interval_1') %}
                  {% if ' - ' not in raw %}
                    false
                  {% else %}
                    {% set start = as_datetime(raw.split(' - ')[0]) %}
                    {% set now_ok = now() < start %}
                    {% set required = state_attr('sensor.sem_relative_expensive_price_1', 'kwh_required') | float(0) %}
                    {% set soc = states('sensor.batteries_state_of_capacity') | float(0) %}
                    {% set capacity = state_attr('sensor.sem_battery_charge_energy_1a_2', 'usable_capacity') | float(0) %}
                  {% set current_kwh = soc / 100 * capacity %}
                    {{ now_ok and required > 0 and current_kwh + 0.5 <= required }}
                  {% endif %}
              - condition: state
                entity_id: input_boolean.sem_battery_save
                state: "off"
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: "0"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sem_battery_save
          # USE-INTERVAL: ALLOWS DISCHARGE IN BATTERY INTERVAL AND NO EV CHARGE
          - conditions:
              - condition: template
                value_template: >
                  {% set raw = states('sensor.sem_battery_use_interval_1') %}
                  {% if ' - ' not in raw %}
                    false
                  {% else %}
                    {% set start = as_datetime(raw.split(' - ')[0]) %}
                    {{ now() >= start }}
                  {% endif %}
              - condition: state
                entity_id: input_boolean.sem_battery_save
                state: "on"
              - condition: state
                entity_id: input_boolean.sem_ev_charging_protection_status
                state: "off"
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: "{{ states('input_number.sem_battery_discharge_power_ev_limit') | float * 1000 }}"
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sem_battery_save

################################################################################
  - alias: "SEM - Battery use between 00-12"
    triggers:
      - trigger: time_pattern
        minutes: "/15" 
    condition:
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
