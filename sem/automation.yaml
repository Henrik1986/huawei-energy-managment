################################################################################
  - alias: SEM - Update battery mix every 15 min
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/14"
        seconds: "0"
    actions:
      # --- SOLAR ---
      - action: input_number.set_value
        target:
          entity_id: input_number.sem_battery_solar_kwh
        data:
          value: >-
            {% set total_capacity = states('input_number.sem_battery_total_capacity_kwh') | float(14) %}
            {{ [(states('input_number.sem_battery_solar_kwh') | float + states('sensor.sem_battery_solar_delta') | float), total_capacity - (states('input_number.sem_battery_grid_kwh') | float)] | min | round(2) }}
      # --- GRID ---
      - action: input_number.set_value
        target:
          entity_id: input_number.sem_battery_grid_kwh
        data:
          value: >-
            {% set total_capacity = states('input_number.sem_battery_total_capacity_kwh') | float(14) %}
            {{ [(states('input_number.sem_battery_grid_kwh') | float + states('sensor.sem_battery_grid_delta') | float), total_capacity - (states('input_number.sem_battery_solar_kwh') | float)] | min | round(2) }}
################################################################################
  - alias: SEM - Store start values window 1a
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_interval_1a
        to: "on"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.sem_battery_price_window_1
        data:
          value: "{{ state_attr('sensor.sem_battery_charge_energy_1a_2', 'avg_window') | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.grid_charge_start_1a
        data:
          value: "{{ states('sensor.sem_battery_charge_from_grid_energy') | float(0) }}"

  - alias: SEM - Store end values window 1a
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_interval_1a
        to: "off"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.grid_charge_stop_1a
        data:
          value: "{{ states('sensor.sem_battery_charge_from_grid_energy') | float(0) }}"

################################################################################
  - alias: SEM - Store start values window 2
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_interval_2
        to: "on"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.sem_battery_price_window_2
        data:
          value: "{{ state_attr('sensor.sem_battery_charge_energy_2_1b', 'avg_window') | float(0) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.grid_charge_start_2
        data:
          value: "{{ states('sensor.sem_battery_charge_from_grid_energy') | float(0) }}"

  - alias: SEM - Store end values window 2
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_interval_2
        to: "off"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.grid_charge_stop_2
        data:
          value: "{{ states('sensor.sem_battery_charge_from_grid_energy') | float(0) }}"
################################################################################
  - alias: Update packages from GitHub
    triggers:
      - trigger: template
        value_template: >
          {{ now().weekday() == 6 and now().hour == 3 and now().minute == 0 }}
      - trigger: state
        entity_id: input_boolean.manual_update_packages
        to: 'on'
    actions:
      - action: shell_command.update_packages_from_github
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.sem_download
      - delay: "00:00:10"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sem_download
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.sem_download_finished
      - delay: "00:00:30"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sem_download_finished
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.manual_update_packages
