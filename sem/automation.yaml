                data:
                  value: "0"
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sem_battery_save
          # USE-INTERVAL: ALLOWS DISCHARGE IN BATTERY INTERVAL AND NO EV CHARGE
          - conditions:        
              - condition: template
                value_template: >
                  {% set raw = states('sensor.sem_battery_use_interval_2') %}
