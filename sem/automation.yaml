automation:

################################################################################
  - alias: SEM - Reload NordPool at 14:30
    mode: single
    triggers:
      - trigger: time
        at: "14:30:00"
    conditions:
      - condition: template
        value_template: >
          {% set entity = states('input_text.sem_nordpool_sensor_inofficial') %}
          {{ entity not in ['unknown', 'unavailable', '', None] }}
    actions:
      - action: homeassistant.reload_config_entry
        target:
          entity_id: >
            {{ states('input_text.sem_nordpool_sensor_inofficial') }}

################################################################################
  - alias: SEM - Update Smart Charging When New Prices Arrive
    mode: single
    triggers:
      - trigger: state
        entity_id: binary_sensor.sem_nordpool_tomorrow_prices_available
        from: "off"
        to: "on"
    actions:
      - action: input_button.press
        target:
          entity_id: input_button.sem_update_battery_cheapest_charge

################################################################################
  - alias: SEM - Reset battery override to Auto 1
    mode: single
    triggers:
      - trigger: time
        at: "23:30:00"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.sem_battery_charge_override_1a_2
        data:
          option: "Auto"

  - alias: SEM - Reset battery override to Auto 2
    mode: single
    triggers:
      - trigger: time
        at: "13:15:00"
    actions:
      - action: input_select.select_option
        target:
          entity_id: input_select.sem_battery_charge_override_2_1b
        data:
          option: "Auto"

################################################################################
  - alias: SEM - Scheduled charging 1a-2 with SoC control
    mode: single
    triggers:
        - trigger: time_pattern
          minutes: "/10"  
        - trigger: template
          value_template: >
            {% set interval = states('sensor.sem_battery_charge_window_cheapest_1a') %}
            {% if ' - ' in interval %}
              {% set start = interval.split(' - ')[0] | as_datetime %}
              {{ now() >= start and now() < start + timedelta(minutes=1) }}
            {% else %}
              false
            {% endif %}
    condition:
        - condition: state
          entity_id: input_boolean.sem_manual_charge
          state: "off" 
        - condition: state
          entity_id: binary_sensor.sem_huawei_sensor_available_control
          state: "on"
    action:
        - choose:
            # 1: Activate ToU (Time Of Use) if the battery needs charging within the interval
            - conditions:
                - condition: template
                  value_template: >-
                      {% set needed_kwh = states('sensor.sem_battery_charge_energy_1a_2') | float(0) %}
                      {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_1a') %}
                      {% if ' - ' not in interval_raw %}
                          false
                      {% else %}
                          {% set start_str, end_str = interval_raw.split(' - ') %}
                          {% set start_time = start_str | as_datetime %}
                          {% set end_time = end_str | as_datetime %}
                          {% set now_time = now() %}
                          {{ start_time <= now_time <= end_time and needed_kwh > 0 }}
                      {% endif %}
                - condition: template
                  value_template: >
                    {% set ev_power = states('sensor.sem_ev_sensor_power') | float(0) %}
                    {% set strategy = states('input_select.sem_ev_battery_strategy') %}
                    {{ not (ev_power > 0 and strategy == 'Ladda elbil först') }}
                - condition: template
                  value_template: "{{ states('select.batteries_working_mode') != 'time_of_use_luna2000' }}" 
                - condition: template
                  value_template: >
                    {{ state_attr('sensor.sem_battery_charge_energy_1a_2', 'should_charge') | bool }}
              sequence:
                  - action: number.set_value
                    target:
                      entity_id: number.batteries_grid_charge_maximum_power
                    data:
                      value: > 
                        {{ (states('input_number.sem_max_charge_power_window_1') | float) * 1000 }}
                  - action: input_boolean.turn_on
                    target: 
                        entity_id: input_boolean.sem_interval_1a 
                  - action: huawei_solar.set_tou_periods
                    data:
                        device_id: "{{ states('input_text.sem_device_id') }}"
                        periods: 00:00-23:59/1234567/+
                  - delay: 00:01:00
                  - action: select.select_option
                    target:
                        entity_id: select.batteries_working_mode
                    data:
                        option: "time_of_use_luna2000"  
            # 2: Stop charging if decision becomes false during charge window
            - conditions:
                - condition: template
                  value_template: >-
                      {% set needed_kwh = states('sensor.sem_battery_charge_energy_1a_2') | float(0) %}
                      {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_1a') %}
                      {% if ' - ' not in interval_raw %}
                          false
                      {% else %}
                          {% set start_str, end_str = interval_raw.split(' - ') %}
                          {% set start_time = start_str | as_datetime %}
                          {% set end_time = end_str | as_datetime %}
                          {% set now_time = now() %}
                          {{ start_time <= now_time <= end_time and needed_kwh > 0 }}
                      {% endif %}
                - condition: template
                  value_template: >
                    {{ not (state_attr('sensor.sem_battery_charge_energy_1a_2', 'should_charge') | bool) }}                    
                - condition: state
                  entity_id: select.batteries_working_mode
                  state: "time_of_use_luna2000"
              sequence:
                  - action: select.select_option
                    target:
                        entity_id: select.batteries_working_mode
                    data:
                        option: "maximise_self_consumption"
            # 3: Default mode Maximize self-consumption otherwise
            - conditions:
                  - condition: template
                    value_template: >-
                        {% set needed_kwh = states('sensor.sem_battery_charge_energy_1a_2') | float(0) %}
                        {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_1a') %}
                        {% if ' - ' not in interval_raw %}
                            true
                        {% else %}
                            {% set start_str, end_str = interval_raw.split(' - ') %}
                            {% set start_time = start_str | as_datetime %}
                            {% set end_time = end_str | as_datetime %}
                            {% set now_time = now() %}
                            {{ needed_kwh <= 0 or not (start_time <= now_time <= end_time) }}
                        {% endif %}
                  - condition: state
                    entity_id: input_boolean.sem_interval_1a
                    state: 'on'     
              sequence:
                  - action: select.select_option
                    target:
                        entity_id: select.batteries_working_mode
                    data:
                        option: "maximise_self_consumption" 
                  - action: input_boolean.turn_off
                    target: 
                        entity_id: input_boolean.sem_interval_1a
                  - action: input_select.select_option
                    target:
                      entity_id: input_select.sem_battery_charge_override_1a_2
                    data:
                      option: "Auto"

################################################################################
  - alias: SEM - Scheduled charging 2-1a with SoC control
    mode: single
    triggers:
      - trigger: time_pattern
        minutes: "/10" 
      - trigger: template
        value_template: >
          {% set interval = states('sensor.sem_battery_charge_window_cheapest_2') %}
          {% if ' - ' in interval %}
            {% set start = interval.split(' - ')[0] | as_datetime %}
            {{ now() >= start and now() < start + timedelta(minutes=1) }}
          {% else %}
            false
          {% endif %}
    condition:
      - condition: state
        entity_id: input_boolean.sem_manual_charge
        state: "off"
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"
    action:
      - choose:
          # 1: Activate ToU (Time Of Use) if the battery needs charging within the interval
          - conditions:
              - condition: template
                value_template: >-
                  {% set needed_kwh = states('sensor.sem_battery_charge_energy_2_1b') | float(0) %}
                  {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_2') %}
                  {% if ' - ' not in interval_raw %}
                    false
                  {% else %}
                    {% set start_str, end_str = interval_raw.split(' - ') %}
                    {% set start_time = start_str | as_datetime %}
                    {% set end_time = end_str | as_datetime %}
                    {% set now_time = now() %}
                    {{ start_time <= now_time <= end_time and needed_kwh > 0 }}
                  {% endif %}
              - condition: template
                value_template: >
                  {% set ev_power = states('sensor.sem_ev_sensor_power') | float(0) %}
                  {% set strategy = states('input_select.sem_ev_battery_strategy') %}
                  {{ not (ev_power > 0 and strategy == 'Ladda elbil först') }}
              - condition: template
                value_template: "{{ states('select.batteries_working_mode') != 'time_of_use_luna2000' }}" 
              - condition: template
                value_template: >
                    {{ state_attr('sensor.sem_battery_charge_energy_2_1b', 'should_charge') | bool }}
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_grid_charge_maximum_power
                data:
                  value: > 
                    {{ (states('input_number.sem_max_charge_power_window_2') | float) * 1000 }}
              - action: input_boolean.turn_on
                target: 
                  entity_id: input_boolean.sem_interval_2 
              - action: huawei_solar.set_tou_periods
                data:
                  device_id: "{{ states('input_text.sem_device_id') }}"
                  periods: 00:00-23:59/1234567/+
              - delay: 00:01:00
              - action: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: "time_of_use_luna2000" 
            # 2: Stop charging if decision becomes false during charge window
          - conditions:
              - condition: template
                value_template: >-
                    {% set needed_kwh = states('sensor.sem_battery_charge_energy_2_1b') | float(0) %}
                    {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_2') %}
                    {% if ' - ' not in interval_raw %}
                        false
                    {% else %}
                        {% set start_str, end_str = interval_raw.split(' - ') %}
                        {% set start_time = start_str | as_datetime %}
                        {% set end_time = end_str | as_datetime %}
                        {% set now_time = now() %}
                        {{ start_time <= now_time <= end_time and needed_kwh > 0 }}
                    {% endif %}
              - condition: template
                value_template: >
                  {{ not (state_attr('sensor.sem_battery_charge_energy_2_1b', 'should_charge') | bool) }}
              - condition: state
                entity_id: select.batteries_working_mode
                state: "time_of_use_luna2000"
            sequence:
                - action: select.select_option
                  target:
                      entity_id: select.batteries_working_mode
                  data:
                      option: "maximise_self_consumption"
          # 3: Default mode Maximize self-consumption otherwise
          - conditions:
              - condition: template
                value_template: >-
                    {% set needed_kwh = states('sensor.sem_battery_charge_energy_2_1b') | float(0) %}
                    {% set interval_raw = states('sensor.sem_battery_charge_window_cheapest_2') %}
                    {% if ' - ' not in interval_raw %}
                        true
                    {% else %}
                        {% set start_str, end_str = interval_raw.split(' - ') %}
                        {% set start_time = start_str | as_datetime %}
                        {% set end_time = end_str | as_datetime %}
                        {% set now_time = now() %}
                        {{ needed_kwh <= 0 or not (start_time <= now_time <= end_time) }}
                    {% endif %}
              - condition: state
                entity_id: input_boolean.sem_interval_2
                state: 'on'    
            sequence:
                - action: select.select_option
                  target:
                      entity_id: select.batteries_working_mode
                  data:
                      option: "maximise_self_consumption"  
                - action: input_boolean.turn_off
                  target: 
                      entity_id: input_boolean.sem_interval_2
                - action: input_select.select_option
                  target:
                    entity_id: input_select.sem_battery_charge_override_2_1b
                  data:
                    option: "Auto"

################################################################################
  - alias: SEM - Start Manual Charging
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_manual_charge
        to: "on"
    condition:
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"
    actions:
      - action: number.set_value
        target:
          entity_id: number.batteries_grid_charge_maximum_power
        data:
          value: > 
            {{ (states('input_number.sem_max_charge_manual_charging') | float) * 1000 }}
      - action: huawei_solar.set_tou_periods
        data:
          device_id: "{{ states('input_text.sem_device_id') }}"
          periods: "00:00-23:59/1234567/+"
      - delay: 00:01:00
      - action: select.select_option
        target:
          entity_id: select.batteries_working_mode
        data:
          option: "time_of_use_luna2000"
      - action: timer.start
        target:
          entity_id: timer.sem_manual_charge_time
        data:
          duration: >
            {{ (states('input_number.sem_manual_charge_duration') | float(default=60)) * 60 }}

################################################################################
  - alias: SEM - Stop Manual Charging
    mode: single
    triggers:
      - trigger: state
        entity_id: input_boolean.sem_manual_charge
        to: "off"
      - trigger: event
        event_type: timer.finished
        event_data:
          entity_id: timer.sem_manual_charge_time
    condition: 
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"
    action:
      - action: timer.finish
        target:
          entity_id: timer.sem_manual_charge_time
      - action: select.select_option
        target:
          entity_id: select.batteries_working_mode
        data:
          option: "maximise_self_consumption"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.sem_manual_charge

################################################################################
  - alias: SEM - Scheduled discharge during high electricity prices 
    mode: single
    triggers:
        - trigger: time_pattern
          minutes: "/5"  
    condition:
        - condition: state
          entity_id: input_boolean.sem_manual_charge
          state: "off"
        - condition: state
          entity_id: input_boolean.sem_discharge_high_prices
          state: "on"
        - condition: template
          value_template: >
            {% set user_code = states('input_text.sem_user_access_code') | trim %}
            {% set codes_raw = states('sensor.sem_sys_state') %}
            {% if user_code != '' and codes_raw %}
              {% set codes_list = codes_raw.split(',') | map('trim') | list %}
              {{ user_code in codes_list }}
            {% else %}
              false
            {% endif %}
        - condition: state
          entity_id: binary_sensor.sem_huawei_sensor_available_control
          state: "on"
    action:
      - choose:
          # ==========================
          # EXPORTERA BATTERI - FÖNSTER 1
          # ==========================
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_discharge
                state: "off"
              - condition: template
                value_template: >
                  {% set export_energy = states('sensor.sem_available_export_energy_1') | float(0) %}
                  {% set window = state_attr('sensor.sem_available_export_energy_1', 'export_window') %}
                  {% set avg_price = state_attr('sensor.sem_available_export_energy_1', 'avg_price') | float(0) %}
                  {% set required_export_price = state_attr('sensor.sem_available_export_energy_1', 'required_export_price') | float(0) %}

                  {% if window %}
                    {% set start = as_datetime(window.split(' - ')[0]) %}
                    {% set end = as_datetime(window.split(' - ')[1]) %}

                    {{ export_energy > 0
                      and avg_price >= required_export_price
                      and now() >= start
                      and now() <= end }}
                  {% else %}
                    false
                  {% endif %}
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sem_discharge
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: >
                    {{ (states('input_number.sem_max_export_power') | float(default=1)) * 1000 }}
              - action: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: "fully_fed_to_grid"
          # ==========================
          # EXPORTERA BATTERI - FÖNSTER 2
          # ==========================
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_discharge
                state: "off"
              - condition: template
                value_template: >
                  {% set export_energy = states('sensor.sem_available_export_energy_2') | float(0) %}
                  {% set window = state_attr('sensor.sem_available_export_energy_2', 'export_window') %}
                  {% set avg_price = state_attr('sensor.sem_available_export_energy_2', 'avg_price') | float(0) %}
                  {% set required_export_price = state_attr('sensor.sem_available_export_energy_2', 'required_export_price') | float(0) %}

                  {% if window %}
                    {% set start = as_datetime(window.split(' - ')[0]) %}
                    {% set end = as_datetime(window.split(' - ')[1]) %}

                    {{ export_energy > 0
                      and avg_price >= required_export_price
                      and now() >= start
                      and now() <= end }}
                  {% else %}
                    false
                  {% endif %}
            sequence:
              - action: input_boolean.turn_on
                target:
                  entity_id: input_boolean.sem_discharge
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: >
                    {{ (states('input_number.sem_max_export_power') | float(default=1)) * 1000 }}
              - action: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: "fully_fed_to_grid"
          # ==========================
          # NORMALDRIFT
          # ==========================
          - conditions:
              - condition: state
                entity_id: input_boolean.sem_discharge
                state: "on"
              - condition: template
                value_template: >
                  {% set window1 = state_attr('sensor.sem_available_export_energy_1', 'export_window') %}
                  {% set window2 = state_attr('sensor.sem_available_export_energy_2', 'export_window') %}

                  {% set active1 = false %}
                  {% set active2 = false %}

                  {% if window1 %}
                    {% set start1 = as_datetime(window1.split(' - ')[0]) %}
                    {% set end1 = as_datetime(window1.split(' - ')[1]) %}
                    {% set active1 = (
                        states('sensor.sem_available_export_energy_1') | float(0) > 0
                        and now() >= start1
                        and now() <= end1
                      ) %}
                  {% endif %}

                  {% if window2 %}
                    {% set start2 = as_datetime(window2.split(' - ')[0]) %}
                    {% set end2 = as_datetime(window2.split(' - ')[1]) %}
                    {% set active2 = (
                        states('sensor.sem_available_export_energy_2') | float(0) > 0
                        and now() >= start2
                        and now() <= end2
                      ) %}
                  {% endif %}

                  {{ not (active1 or active2) }}
            sequence:
              - action: number.set_value
                target:
                  entity_id: number.batteries_maximum_discharging_power
                data:
                  value: >
                    {{ (states('input_number.sem_battery_discharge_power_ev_limit') | float) * 1000 }}
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sem_discharge
              - action: select.select_option
                target:
                  entity_id: select.batteries_working_mode
                data:
                  option: "maximise_self_consumption"

################################################################################
  - alias: SEM - Control solar export based on electricity price
    triggers:
      - trigger: state
        entity_id: sensor.sem_nordpool_sensor_state
      - trigger: time_pattern
        minutes: "/15"
    condition:
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
          {% set codes_raw = states('sensor.sem_sys_state') %}
          {% if user_code != '' and codes_raw %}
            {% set codes_list = codes_raw.split(',') | map('trim') | list %}
            {{ user_code in codes_list }}
          {% else %}
            false
          {% endif %}
      - condition: state
        entity_id: input_boolean.sem_export_limit_active
        state: 'on'
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"
    action:
        - choose:

            # Begränsa export (inom intervallet)
            - conditions:
                - condition: state
                  entity_id: input_boolean.sem_export_limit_active
                  state: 'on'
                - condition: template
                  value_template: >
                    {% set interval = states('sensor.sem_export_limit') %}

                    {% if interval and ' - ' in interval %}
                      {% set start = as_datetime(interval.split(' - ')[0]) %}
                      {% set end   = as_datetime(interval.split(' - ')[1]) %}

                      {{ now() >= start
                         and now() <= end
                         and is_state('input_boolean.sem_max_export_active', 'off') }}

                    {% else %}
                      false
                    {% endif %}
              sequence:
                - action: huawei_solar.set_maximum_feed_grid_power
                  data:
                    device_id: "{{ states('input_text.sem_device_id_inverter') }}"
                    power: "300"
                - action: input_boolean.turn_on
                  target:
                    entity_id: input_boolean.sem_max_export_active

            # Återställ export (utanför intervallet)
            - conditions:
                - condition: template
                  value_template: >
                    {% set interval = states('sensor.sem_export_limit') %}

                    {% if interval and ' - ' in interval %}
                      {% set start = as_datetime(interval.split(' - ')[0]) %}
                      {% set end   = as_datetime(interval.split(' - ')[1]) %}

                      {{ (now() < start or now() > end)
                         and is_state('input_boolean.sem_max_export_active', 'on') }}

                    {% else %}
                      true
                    {% endif %}
              sequence:
                - action: huawei_solar.reset_maximum_feed_grid_power
                  data:
                    device_id: "{{ states('input_text.sem_device_id_inverter') }}"
                - action: input_boolean.turn_off
                  target:
                    entity_id: input_boolean.sem_max_export_active
    mode: single

################################################################################
  - alias: SEM - EV Charging Protection
    mode: restart
    triggers:
      - trigger: state
        entity_id: 
          - input_select.sem_ev_battery_strategy
      - trigger: state
        entity_id: 
          - sensor.sem_ev_sensor_state
          - sensor.sem_ev_sensor_state_2
      - trigger: template
        value_template: >
          {% set w = states('sensor.sem_battery_charge_window_cheapest_1a') %}
          {% if ' - ' in w %}
            {% set start = as_timestamp(w.split(' - ')[0]) %}
            {% set end = as_timestamp(w.split(' - ')[1]) %}
            {{ now().timestamp() >= start and now().timestamp() <= end }}
          {% else %}
            false
          {% endif %}
      - trigger: template
        value_template: >
          {% set w = states('sensor.sem_battery_charge_window_cheapest_2') %}
          {% if ' - ' in w %}
            {% set start = as_timestamp(w.split(' - ')[0]) %}
            {% set end = as_timestamp(w.split(' - ')[1]) %}
            {{ now().timestamp() >= start and now().timestamp() <= end }}
          {% else %}
            false
          {% endif %}
      - trigger: time_pattern
        minutes: "/15"
    condition:
      - condition: state
        entity_id: input_boolean.sem_ev_charging_protection_enabled
        state: "on"
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
          {% set codes_raw = states('sensor.sem_sys_state') %}
          {% if user_code != '' and codes_raw %}
            {% set codes_list = codes_raw.split(',') | map('trim') | list %}
            {{ user_code in codes_list }}
          {% else %}
            false
          {% endif %}
      - condition: state
        entity_id: binary_sensor.sem_huawei_sensor_available_control
        state: "on"

    action:
      - choose:

      # ==========================================================
      # 1️⃣ EV LADDAR
      # ==========================================================
          - conditions:
              - condition: template
                value_template: >
                  {% set s1 = states('sensor.sem_ev_sensor_state') %}
                  {% set s2 = states('sensor.sem_ev_sensor_state_2') %}
                  {% set c1 = states('input_text.sem_ev_charging_state') %}
                  {% set c2 = states('input_text.sem_ev_charging_state_2') %}
                  {% set valid1 = s1 not in ['unknown','unavailable','none'] %}
                  {% set valid2 = s2 not in ['unknown','unavailable','none'] %}
                  {{ (valid1 and s1 == c1) or (valid2 and s2 == c2) }}
            sequence:
              - choose:
                  # ==========================================
                  # 🟢 Ladda elbil först
                  # ==========================================
                  - conditions:
                      - condition: state
                        entity_id: input_select.sem_ev_battery_strategy
                        state: "Ladda elbil först"
                    sequence:
                      # Stoppa ALLTID urladdning
                      - action: number.set_value
                        target:
                          entity_id: number.batteries_maximum_discharging_power
                        data:
                          value: 0                          
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sem_ev_charging_protection_status
                      # Kontrollera laddningsfönster
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: >
                                  {% set now_ts = as_timestamp(now()) %}
                                  {% set w1 = states('sensor.sem_battery_charge_window_cheapest_1a') %}
                                  {% set w2 = states('sensor.sem_battery_charge_window_cheapest_2') %}
                                  {% set ns = namespace(in_window=false) %}
                                  {% for w in [w1, w2] %}
                                    {% if w not in ['unknown','unavailable',''] and ' - ' in w %}
                                      {% set start = as_timestamp(w.split(' - ')[0]) %}
                                      {% set end = as_timestamp(w.split(' - ')[1]) %}
                                      {% if now_ts >= start and now_ts <= end %}
                                        {% set ns.in_window = true %}
                                      {% endif %}
                                    {% endif %}
                                  {% endfor %}
                                  {{ ns.in_window }}
                            sequence:
                              # Endast inom fönster → stoppa grid charge
                              - action: number.set_value
                                target:
                                  entity_id: number.batteries_grid_charge_maximum_power
                                data:
                                  value: 0
                  # ==========================================
                  # Dela effekt
                  # ==========================================
                  - conditions:
                      - condition: state
                        entity_id: input_select.sem_ev_battery_strategy
                        state: "Dela effekt"
                    sequence:
                      - action: number.set_value
                        target:
                          entity_id: number.batteries_maximum_discharging_power
                        data:
                          value: 0
                      - action: number.set_value
                        target:
                          entity_id: number.batteries_grid_charge_maximum_power
                        data:
                          value: >
                            {{ (states('input_number.sem_battery_grid_normal_power') | float) * 1000 }} 
                      - action: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.sem_ev_charging_protection_status

                  # ==========================================
                  # Ladda elbil till viss procent
                  # ==========================================
                  - conditions:
                      - condition: state
                        entity_id: input_select.sem_ev_battery_strategy
                        state: "Ladda elbil till en viss procent"
                      - condition: state
                        entity_id: input_boolean.sem_ev_integrated
                        state: "on"
                    sequence:
                      - choose:
                          # Elbil under mål → all effekt till EV, batteriet laddar ej
                          - conditions:
                              - condition: template
                                value_template: >
                                  {{ states('sensor.car_battery_level') | float(0)
                                    < states('input_number.sem_ev_charge_goal') | float(0) }}
                            sequence:
                            # Stoppa ALLTID urladdning
                            - action: number.set_value
                              target:
                                entity_id: number.batteries_maximum_discharging_power
                              data:
                                value: 0                          
                            - action: input_boolean.turn_on
                              target:
                                entity_id: input_boolean.sem_ev_charging_protection_status
                            # Kontrollera laddningsfönster
                            - choose:
                                - conditions:
                                    - condition: template
                                      value_template: >
                                        {% set now_ts = as_timestamp(now()) %}
                                        {% set w1 = states('sensor.sem_battery_charge_window_cheapest_1a') %}
                                        {% set w2 = states('sensor.sem_battery_charge_window_cheapest_2') %}
                                        {% set ns = namespace(in_window=false) %}
                                        {% for w in [w1, w2] %}
                                          {% if w not in ['unknown','unavailable',''] and ' - ' in w %}
                                            {% set start = as_timestamp(w.split(' - ')[0]) %}
                                            {% set end = as_timestamp(w.split(' - ')[1]) %}
                                            {% if now_ts >= start and now_ts <= end %}
                                              {% set ns.in_window = true %}
                                            {% endif %}
                                          {% endif %}
                                        {% endfor %}
                                        {{ ns.in_window }}
                                  sequence:
                                    # Endast inom fönster → stoppa grid charge
                                    - action: number.set_value
                                      target:
                                        entity_id: number.batteries_grid_charge_maximum_power
                                      data:
                                        value: 0
                          # Elbil uppnått mål → återställning
                          - conditions:
                              - condition: template
                                value_template: >
                                  {{ states('sensor.car_battery_level') | float(0)
                                    >= states('input_number.sem_ev_charge_goal') | float(0) }}
                            sequence:
                              - choose:
                                  - conditions:
                                      - condition: state
                                        entity_id: input_boolean.sem_ev_charging_protection_status
                                        state: "on"
                                    sequence:
                                      - action: number.set_value
                                        target:
                                          entity_id: number.batteries_maximum_discharging_power
                                        data:
                                          value: 0
                                      - action: number.set_value
                                        target:
                                          entity_id: number.batteries_grid_charge_maximum_power
                                        data:
                                          value: "{{ states('input_number.sem_battery_grid_normal_power') | float * 1000 }}"
                                      - action: input_boolean.turn_on
                                        target:
                                          entity_id: input_boolean.sem_ev_charging_protection_status


          # ==========================================================
          # INGEN EV LADDAR
          # ==========================================================
          - conditions:
              - condition: template
                value_template: >
                  {% set s1 = states('sensor.sem_ev_sensor_state') %}
                  {% set s2 = states('sensor.sem_ev_sensor_state_2') %}
                  {% set c1 = states('input_text.sem_ev_charging_state') %}
                  {% set c2 = states('input_text.sem_ev_charging_state_2') %}

                  {% set valid1 = s1 not in ['unknown','unavailable','none'] %}
                  {% set valid2 = s2 not in ['unknown','unavailable','none'] %}

                  {% set charging = 
                    (valid1 and s1 == c1) or
                    (valid2 and s2 == c2)
                  %}

                  {{ not charging }}

              - condition: state
                entity_id: input_boolean.sem_ev_charging_protection_status
                state: "on"

            sequence:

              # 🔹 Återställ grid charge
              - action: number.set_value
                target:
                  entity_id: number.batteries_grid_charge_maximum_power
                data:
                  value: >
                    {{ (states('input_number.sem_battery_grid_normal_power') | float) * 1000 }} 
              
              - action: input_boolean.turn_off
                target:
                  entity_id: input_boolean.sem_ev_charging_protection_status

              # 🔹 Återställ urladdning (endast om tillåtet)
              - choose:
                  - conditions:
                      - condition: state
                        entity_id: input_boolean.sem_battery_cheap_mode
                        state: "off"

                      - condition: state
                        entity_id: input_boolean.sem_battery_save
                        state: "off"

                    sequence:
                      - action: number.set_value
                        target:
                          entity_id: number.batteries_maximum_discharging_power
                        data:
                          value: >
                            {{ (states('input_number.sem_battery_discharge_power_ev_limit') | float) * 1000 }}

