################################################################################
  - alias: "SEM - EV DYNAMIC CHOOSE"
    mode: single

    triggers:
      - trigger: homeassistant
        event: start
      - trigger: state
        entity_id: input_boolean.sem_ev_integrated
    actions:
      - choose:
          #EV-integration aktiv
          - conditions:
