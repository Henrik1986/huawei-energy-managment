              {% set k_evening = states('sensor.sem_energy_avg_evening') | float(0) %}
              {% set k_night = states('sensor.sem_energy_avg_night') | float(0) %}
              {% set forecast_raw = state_attr('sensor.sem_solar_forecast','sem') %}
              {% set forecast = forecast_raw if forecast_raw is mapping else {} %}
              {% set wp = forecast.get('watt_hours_period', []) %}
              {% set sol_factor = state_attr('sensor.sem_battery_charge_energy_2_1b','adjustment_factor_solar_energy') | float(1) %}
              {% set sol_map = namespace(data={}) %}
              {% for e in wp %}
                {% if e is mapping %}
                  {% set d = e.get('date') %}
                  {% set v = e.get('values') %}
                  {% if d is not none and v is not none %}
                    {% set dt = as_datetime(d) %}
                    {% set ts_hour = dt.replace(minute=0, second=0, microsecond=0) %}
                    {% set kwh = (v | float / 1000) * sol_factor %}
                    {% set sol_map.data = dict(sol_map.data, **{ts_hour|string: kwh}) %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% set ns = namespace(current=start, total=0) %}
              {% for i in range(0,72) %}
                {% if ns.current >= end %}
                  {% break %}
                {% endif %}
                {% set h = ns.current.hour %}
                {% set ts_key = ns.current.replace(minute=0, second=0, microsecond=0) | string %}
                {% if 5 <= h < 10 %}
                  {% set need = k_morning %}
                {% elif 10 <= h < 15 %}
                  {% set need = k_day %}
                {% elif 15 <= h < 21 %}
                  {% set need = k_evening %}
                {% else %}
                  {% set need = k_night %}
                {% endif %}
                {% set sol = sol_map.data.get(ts_key, 0) %}
                {% set surplus_energy = [sol - need, 0] | max %}
                {% set ns.total = ns.total + surplus_energy %}
                {% set ns.current = ns.current + timedelta(hours=1) %}
              {% endfor %}
              {{ ns.total | round(2) }}
            {% endif %}
          reserved_energy_for_peak_period: >
            {{ state_attr('sensor.sem_relative_expensive_price_2','kwh_required') | float(0) }}
          prioritized_export_window: >
            {% set avg_1 = state_attr('sensor.sem_export_window_1','avg_price') | float(0) %}
            {% set avg_2 = state_attr('sensor.sem_export_window_2','avg_price') | float(0) %}
            {{ avg_2 > avg_1 }}
          export_possible: >
            {% set export_window = states('sensor.sem_export_window_2') %}

            {% if ' - ' not in export_window %}
            Inget exportfönster
            {% else %}

            {% set start = as_datetime(export_window.split(' - ')[1]) %}
            {% set end = start.replace(hour=0, minute=0, second=0, microsecond=0) + timedelta(days=2) %}

            {% set available_export = states('sensor.sem_available_export_energy_2') | float(0) %}

            {% set k_morning = states('sensor.sem_energy_avg_morning') | float(0) %}
            {% set k_day = states('sensor.sem_energy_avg_day') | float(0) %}
            {% set k_evening = states('sensor.sem_energy_avg_evening') | float(0) %}
            {% set k_night = states('sensor.sem_energy_avg_night') | float(0) %}

            {% set forecast_raw = state_attr('sensor.sem_solar_forecast','sem') %}
            {% set forecast = forecast_raw if forecast_raw is mapping else {} %}
            {% set wp = forecast.get('watt_hours_period', []) %}

            {% set sol_map = namespace(data={}) %}

            {% for e in wp %}
              {% if e is mapping %}
                {% set d = e.get('date') %}
                {% set v = e.get('values') %}
                {% if d is not none and v is not none %}
                  {% set dt = as_datetime(d) %}
                  {% set ts_hour = dt.replace(minute=0, second=0, microsecond=0) %}
                  {% set kwh = (v | float / 1000) %}
                  {% set sol_map.data = dict(sol_map.data, **{ts_hour|string: kwh}) %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% set ns = namespace(current=start, recharge=0, solar=0, house=0) %}

            {#
            Timme för timme:
            #}

            {% for i in range(0,96) %}
              {% if ns.current >= end %}
                {% break %}
              {% endif %}

              {% set h = ns.current.hour %}
              {% set ts_key = ns.current.replace(minute=0, second=0, microsecond=0) | string %}

              {% if 5 <= h < 10 %}
                {% set need = k_morning %}
              {% elif 10 <= h < 15 %}
                {% set need = k_day %}
              {% elif 15 <= h < 21 %}
                {% set need = k_evening %}
              {% else %}
                {% set need = k_night %}
              {% endif %}

              {% set sol = sol_map.data.get(ts_key, 0) %}
              {% set recharge = [sol - need, 0] | max %}

              {#
              {{ ns.current.strftime('%Y-%m-%d %H:%M') }}
                Sol: {{ "%.2f"|format(sol) }}
                Hus: {{ "%.2f"|format(need) }}
                Batteriladdning: {{ "%.2f"|format(recharge) }}
              #}

              {% set ns.solar = ns.solar + sol %}
              {% set ns.house = ns.house + need %}
              {% set ns.recharge = ns.recharge + recharge %}
              {% set ns.current = ns.current + timedelta(hours=1) %}

            {% endfor %}

            {#
            ================================================================

            Start:
            {{ start }}

            Slut:
            {{ end }}

            Total solel:
            {{ ns.solar | round(2) }} kWh

            Total husförbrukning:
            {{ ns.house | round(2) }} kWh

            Återladdningspotential:
            {{ ns.recharge | round(2) }} kWh

            Planerad export:
            {{ available_export | round(2) }} kWh

            Överskott efter återladdning:
            {{ (ns.recharge - available_export) | round(2) }} kWh
            #}

            {{ ns.recharge >= available_export }}

            {% endif %}
          final_decision: >
            {{
              state_attr('sensor.sem_available_export_energy_2', 'export_possible') | bool(false)
              and
              states('sensor.sem_available_export_energy_2') | float(0) > 0
            }}

      # SHOWS EXPORT TIME IN APEX_CHART
      - name: sem_export_window_2_active
        unique_id: sem_export_window_2_active
        state: >
          {% if state_attr('sensor.sem_available_export_energy_2', 'final_decision') %}
            {{ states('sensor.sem_export_window_2') }}
          {% else %}
            1900-01-01T00:00:00-1900-01-01T00:15:00
          {% endif %}

      # CALCULATES CHARGE TIME FROM MAX kW
      - name: "sem_battery_dynamic_charge_time_window_1"
        unique_id: sem_battery_dynamic_charge_time_window_1
        unit_of_measurement: "h"
        state: >
          {# 
            Beräknar laddningstid för laddningsfönster 1 (kl. 9–16)
            Konservativ vinterfaktor för kalla batterier (carport/förråd)
            Max 5 timmar.
          #}

          {% set capacity = states('input_number.sem_battery_total_capacity_kwh') | float(0) %}
          {% set max_power_kw = states('input_number.sem_max_charge_power_window_1') | float(0) %}

          {# Kraftigt justerad månadsbaserad förlustfaktor #}
          {% set month = now().month %}
          {% set loss_factor =
              0.68 if month in [1, 2] else       
              0.82 if month in [3, 4] else        
              0.92 if month in [5, 6, 7, 8, 9] else
              0.75 if month in [10, 11, 12] else  
              0.9
          %}

          {% if max_power_kw > 0 %}
            {% set effective_power = max_power_kw * loss_factor %}
            {% set hours = capacity / effective_power %}
            {{ [ hours | round(1), 5 ] | min }}
          {% else %}
            0
          {% endif %}

      # CALCULATES CHARGE TIME FROM MAX kW
      - name: "sem_battery_dynamic_charge_time_window_2"
        unique_id: sem_battery_dynamic_charge_time_window_2
        unit_of_measurement: "h"
        state: >
          {# 
            Beräknar laddningstid för laddningsfönster 2 (kl. 23–05)
            Konservativ vinterfaktor för kalla batterier (carport/förråd)
            Max 5 timmar.
          #}

          {% set capacity = states('input_number.sem_battery_total_capacity_kwh') | float(0) %}
          {% set max_power_kw = states('input_number.sem_max_charge_power_window_2') | float(0) %}

          {% set month = now().month %}
          {% set loss_factor =
              0.68 if month in [1, 2] else        
              0.82 if month in [3, 4] else        
              0.92 if month in [5, 6, 7, 8, 9] else
              0.75 if month in [10, 11, 12] else  
              0.9
          %}

          {% if max_power_kw > 0 %}
            {% set effective_power = max_power_kw * loss_factor %}
            {% set hours = capacity / effective_power %}
            {{ [ hours | round(1), 5 ] | min }}
          {% else %}
            0
          {% endif %}

      # CALCULATES ENERGY BETWEEN 1A AND 2
      - name: "sem_battery_charge_energy_1a_2"
