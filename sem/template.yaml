              | selectattr('start', '<', interval_end.isoformat())
              | list %}
            {% if filtered | length == 0 %}
              none
            {% else %}
              {% set values =
                filtered | map(attribute='value') | map('float') | list %}
              {% set max_value = values | max %}
              {% set peak_index = values.index(max_value) %}
              {% set start_index =
                [peak_index - 1, 0] | max %}
              {% set end_index =
                [peak_index + 1, (filtered | length) - 1] | min %}
              {% set window_values =
                values[start_index:end_index + 1] %}
              {{ (window_values | sum / window_values | length) | round(3) }}
            {% endif %}

