          {% set battery_capacity = state_attr('sensor.sem_battery_charge_energy_1a_2', 'battery_capacity') | float(0) %}

          {% set pre_ok  = state_attr('sensor.sem_battery_charge_energy_1a_2', 'pre_peak_profit') is true %}
          {% set peak_ok = state_attr('sensor.sem_battery_charge_energy_1a_2', 'peak_profit') is true %}
          {% set post_ok = state_attr('sensor.sem_battery_charge_energy_1a_2', 'post_peak_profit') is true %}

          {% set total_kwh =
            (pre_peak  if pre_ok  else 0) +
            (peak      if peak_ok else 0) +
            (post_peak if post_ok else 0)
