  ######################### TRIGGERS ###########################################

  # SHOWS INTERVAL WHEN SOLAREXPORT SHOULD BE REDUCED
  - trigger:
      - trigger: time
        at: "01:00:00"
    condition:
      - condition: template
        value_template: >
          {% set user_code = states('input_text.sem_user_access_code') | trim %}
          {% set codes_raw = states('sensor.sem_sys_state') %}
          {% if user_code != '' and codes_raw %}
            {% set codes_list = codes_raw.split(',') | map('trim') | list %}
            {{ user_code in codes_list }}
          {% else %}
            false
          {% endif %}
    sensor:
      - name: "sem_export_limit"
        unique_id: sem_export_limit
        state: >
          {% set limit_active = is_state('input_boolean.sem_export_limit_active', 'on') %}

          {% if not limit_active %}
            ""

          {% else %}

            {% set price_threshold = 0 %}
            {% set today = now().date() %}
            {% set all_prices = state_attr('sensor.sem_nordpool_active', 'raw_today') or [] %}

            {% set current_start = namespace(value=None) %}
            {% set current_end = namespace(value=None) %}

            {% set best_start = namespace(value=None) %}
            {% set best_end = namespace(value=None) %}
            {% set best_duration = namespace(value=0) %}

            {% for entry in all_prices %}

              {% set price = entry['value'] | float %}
              {% set time_start = as_datetime(entry['start']) %}
              {% set time_end = as_datetime(entry['end']) %}

              {% if time_start.date() == today %}

                {% if price <= price_threshold %}

                  {% if current_start.value is none %}
                    {% set current_start.value = time_start %}
                  {% endif %}

                  {% set current_end.value = time_end %}

                {% else %}

                  {% if current_start.value is not none %}

                    {% set duration =
                      (as_timestamp(current_end.value) - as_timestamp(current_start.value))
                    %}

                    {% if duration > best_duration.value %}
                      {% set best_duration.value = duration %}
                      {% set best_start.value = current_start.value %}
                      {% set best_end.value = current_end.value %}
                    {% endif %}

                  {% endif %}

                  {% set current_start.value = none %}
                  {% set current_end.value = none %}

                {% endif %}

              {% endif %}

            {% endfor %}

            {# fånga sista blocket #}
            {% if current_start.value is not none %}

              {% set duration =
                (as_timestamp(current_end.value) - as_timestamp(current_start.value))
              %}

              {% if duration > best_duration.value %}
                {% set best_duration.value = duration %}
                {% set best_start.value = current_start.value %}
                {% set best_end.value = current_end.value %}
              {% endif %}

            {% endif %}

            {% if best_start.value is not none %}
              {{ best_start.value }} - {{ best_end.value }}
            {% else %}
              ""
            {% endif %}

          {% endif %}

  # SEARCH CHEAP INTEVALL - USE WHEN BATTERY SHOULD BE IN IDLE 6-18
  - trigger:
      - trigger: time
