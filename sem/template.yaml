template:
  - sensor:
      # CHECK IF THE SYSTEM IS UP TO DATE
      - name: "sem_update_status"
        state: >
          {% set local = states('sensor.sem_version') | replace('v.', '') | replace('v', '') %}
          {% set remote = states('sensor.sem_github_latest_release') %}

          {% if local in ['unknown','unavailable'] or remote in ['unknown','unavailable'] %}
            ❔ Okänt
          {% elif local == remote %}
            ✅ Uppdaterat
          {% else %}
            🎉 Uppdatering tillgänglig
          {% endif %}

      # SYSTEM PLAN
      - name: "sem_system_plan"
        state: >
          {% set h = now().hour %}
          {% if h >= 4 and h < 16 %}
            1
          {% else %}
            2
          {% endif %}

      ####################################### WALLBOX ####################################################
      #SHOWS CHARGEBOX STATE 1
      - name: "sem_ev_sensor_state"
        unique_id: sem_ev_sensor_state
        state: >
          {% set sensor_name = states('input_text.sem_ev_sensor_state') %}
          {% if sensor_name and states(sensor_name) not in ['unknown', 'unavailable', None, ''] %}
            {{ states(sensor_name) }}
          {% else %}
            unknown
          {% endif %}

      # SHOWS CHARGEBOX STATE 2
      - name: "sem_ev_sensor_state_2"
        unique_id: sem_ev_sensor_state_2
        state: >
          {% set sensor_name = states('input_text.sem_ev_sensor_state_2') %}
          {% if sensor_name and states(sensor_name) not in ['unknown', 'unavailable', None, ''] %}
            {{ states(sensor_name) }}
          {% else %}
            unknown
          {% endif %}

      # SHOWS WALLBOX POWER (kW)
      - name: "sem_ev_sensor_power"
        unique_id: sem_ev_sensor_power
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% set multi = is_state('input_boolean.sem_ev_wallbox_multi', 'on') %}
          {% set sn1 = states('input_text.sem_ev_sensor') %}
          {% set sn2 = states('input_text.sem_ev_sensor_2') %}

          {% macro get_kw(name) %}
            {% if not name or name in ['unknown','unavailable',''] %}
              0
            {% else %}
              {% set val = states(name) | float(0) %}
              {% set unit = (state_attr(name, 'unit_of_measurement') or '') | lower %}
              {% if unit == 'w' %}
                {% set val = val / 1000 %}
              {% endif %}
              {{ val }}
            {% endif %}
          {% endmacro %}

          {% set v1 = get_kw(sn1) | float %}

          {% if multi %}
            {% set v2 = get_kw(sn2) | float %}
          {% else %}
            {% set v2 = 0 %}
          {% endif %}

          {% set total = v1 + v2 %}

          {% if total < 0 %}
            0
          {% else %}
            {{ total | round(2) }}
          {% endif %}

      # CHECK IF USER HAS A WALLBOX
      - name: "sem_wallbox_check"
        unique_id: sem_wallboc_check
        state: >
          {% set v = states('input_text.sem_ev_sensor') %}
          {{ v not in ['unknown', 'unavailable', ''] and v.startswith('sensor.') }}

      # ADDS USERS CAR BATTERY PROCENT
      - name: Car Battery Level
        unit_of_measurement: "%"
        state: >
          {% set sensor = states('input_text.car_battery_sensor') %}
          {% if sensor not in ['unknown','unavailable',''] %}
            {{ states(sensor) | float(0) }}
          {% else %}
            0
          {% endif %}

      ################################ ELECTRICITY ####################################################
      #SHOWS NORDPOOL STATE (KOLLA OM DEN FINNS MED I KODEN - BYT DÅ TILL sem_nordpool_active)
      - name: "sem_nordpool_sensor_state"
        unique_id: sem_nordpool_sensor_state
        unit_of_measurement: "SEK/kWh"
        state: >
          {% set sensor_name = states('sensor.sem_nordpool_sensor_id') %}
          {% if sensor_name and states(sensor_name) not in ['unknown', 'unavailable', None, ''] %}
            {{ states(sensor_name) }}
          {% else %}
            unknown
          {% endif %}

      # CHOOSES IF OFFICIAL OR INOFFICIAL NORDPOOL SENSOR IS IN USE
      - name: "sem_nordpool_sensor_id"
        unique_id: sem_nordpool_sensor_id
        state: >
          {%- if is_state('input_boolean.sem_use_official_nordpool', 'on') -%}
            sensor.sem_nordpool_sensor_official
          {%- else -%}
            {{ states('input_text.sem_nordpool_sensor_inofficial') }}
          {%- endif -%}

      #SHOWS ELECTRICPRICE FOR HACS OR OFFICIAL NORDPOOL
      - name: "sem_nordpool_active"
        unique_id: sem_nordpool_active
        unit_of_measurement: "SEK/kWh"
        device_class: monetary
        state_class: measurement
        state: >
          {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
          {% set source = expand(sensor_id) %}
          {% if source | count > 0 %}
            {{ source[0].state | float }}
          {% else %}
            unknown
          {% endif %}
        attributes:
          source_sensor: >
            {{ (states('sensor.sem_nordpool_sensor_id') or '') | trim }}
          debug_sensor_exists: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {{ (expand(sensor_id) | count) > 0 }}
          raw_today: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              [
              {%- for e in source[0].attributes.get('raw_today', []) %}
                {
                  "start": "{{ e.start.isoformat() if e.start is not string else e.start }}",
                  "end": "{{ e.end.isoformat() if e.end is not string else e.end }}",
                  "value": {{ e.value }}
                }{% if not loop.last %},{% endif %}
              {%- endfor %}
              ]
            {% else %}
              []
            {% endif %}
          raw_tomorrow: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              [
              {%- for e in source[0].attributes.get('raw_tomorrow', []) %}
                {
                  "start": "{{ e.start.isoformat() if e.start is not string else e.start }}",
                  "end": "{{ e.end.isoformat() if e.end is not string else e.end }}",
                  "value": {{ e.value }}
                }{% if not loop.last %},{% endif %}
              {%- endfor %}
              ]
            {% else %}
              []
            {% endif %}
          today: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              {{ source[0].attributes.get('today', []) }}
            {% else %}
              []
            {% endif %}
          tomorrow: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              {{ source[0].attributes.get('tomorrow', []) }}
            {% else %}
              []
            {% endif %}
          currency: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              {{ source[0].attributes.get('currency', 'SEK') }}
            {% else %}
              'SEK'
            {% endif %}
          tomorrow_valid: >
            {% set sensor_id = (states('sensor.sem_nordpool_sensor_id') or '') | trim %}
            {% set source = expand(sensor_id) %}
            {% if source | count > 0 %}
              {{ source[0].attributes.get('raw_tomorrow') | length > 0 }}
            {% else %}
              false
            {% endif %}

      # NÄTIMPORT – effekt i kW
      - name: "sem_import_power"
        unique_id: sem_import_power
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% macro to_kw(entity_id) %}
            {% set value = states(entity_id) | float(0) %}
            {% set unit = state_attr(entity_id, 'unit_of_measurement') | default('') | lower %}
            {% if 'w' in unit and 'kw' not in unit %}
              {{ value / 1000 }}
            {% else %}
              {{ value }}
            {% endif %}
          {% endmacro %}
          {% set p = to_kw('sensor.power_meter_active_power') | float(0) %}
          {{ (-p if p < 0 else 0) | round(2) }}

      # NÄTEXPORT – effekt i kW
      - name: "sem_export_power"
        unique_id: sem_export_power
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >
          {% macro to_kw(entity_id) %}
            {% set value = states(entity_id) | float(0) %}
            {% set unit = state_attr(entity_id, 'unit_of_measurement') | default('') | lower %}
            {% if 'w' in unit and 'kw' not in unit %}
              {{ value / 1000 }}
            {% else %}
              {{ value }}
            {% endif %}
          {% endmacro %}
          {% set p = to_kw('sensor.power_meter_active_power') | float(0) %}
          {{ (p if p > 0 else 0) | round(2) }}

      # SOLAR POWER
      - name: "sem_input_power_with_efficiency_loss_kW"
        unique_id: "sem_input_power_with_efficiency_loss_kW"
        unit_of_measurement: "kW"
        device_class: power
        state_class: measurement
        state: >-
          {% set inverter_rating = 10000 %}
          {% set inpower = states('sensor.inverter_input_power') | float(0) %}
          {% if inpower < (inverter_rating * 0.1) %}
              {{ (inpower * 0.90 / 1000) | round(2) }}
          {% elif inpower < (inverter_rating * 0.2) %}
              {{ (inpower * 0.95 / 1000) | round(2) }}
          {% else %}
              {{ (inpower * 0.98 / 1000) | round(2) }}
          {% endif %}

      # SELF CONSUMED SOLAR ENERGY TODAY
      - name: "sem_consumed_solar_energy_today"
        unique_id: "sem_consumed_solar_energy_today"
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        state: >
          {% set solar_produced = states('sensor.sem_solar_production') | float(0) %}
          {% set solar_exported = states('sensor.sem_export') | float(0) %}
          {{ [solar_produced - solar_exported, 0] | max | round(2) }}

      ########
      #SAVINGS
      ########

      # CHARGE POWER BATTERY
      - name: "sem_battery_charge_power"
        unit_of_measurement: "kW"
        state: >
          {% set entity = 'sensor.batteries_charge_discharge_power' %}
          {% set value = states(entity) | float(0) %}
          {% set unit = state_attr(entity, 'unit_of_measurement') | lower %}

          {% if unit == 'w' %}
            {% set value = value / 1000 %}
          {% endif %}

          {{ max(value, 0) }}

      # DISCHARGE POWER BATTERY
      - name: "sem_battery_discharge_power"
        unit_of_measurement: "kW"
        state: >
          {% set entity = 'sensor.batteries_charge_discharge_power' %}
          {% set value = states(entity) | float(0) %}
          {% set unit = state_attr(entity, 'unit_of_measurement') | lower %}

          {% if unit == 'w' %}
            {% set value = value / 1000 %}
          {% endif %}

          {{ max(-value, 0) }}

      # BATTERY CHARGE POWER FROM GRID
      - name: "sem_battery_charge_from_grid_power"
        unit_of_measurement: "kW"
        state: >
          {% set charge = states('sensor.sem_battery_charge_power') | float(0) %}
          {% set import = states('sensor.sem_import_power') | float(0) %}

          {{ [charge, import] | min | round(2) }}

      # BATTERY CHARGE POWER FROM SOLAR
      - name: "sem_battery_charge_from_solar_power"
        unit_of_measurement: "kW"
        state: >
          {% set charge = states('sensor.sem_battery_charge_power') | float(0) %}
          {% set from_grid = states('sensor.sem_battery_charge_from_grid_power') | float(0) %}
          {{ [charge - from_grid, 0] | max }}

      # SOLAR POWER FOR HOUSE POWER
      - name: "sem_solar_to_house_power"
        unit_of_measurement: "kW"
        state: >
          {% set house = states('sensor.sem_house_power_ev') | float(0) %}
          {% set solar = states('sensor.sem_input_power_with_efficiency_loss_kw') | float(0) %}
          {% set battery = states('sensor.batteries_charge_discharge_power') | float(0) %}

          {% set battery_charge = battery if battery > 0 else 0 %}
          {% set solar_available = solar - battery_charge %}

          {% if solar_available > 0 %}
            {{ [house, solar_available] | min }}
          {% else %}
            0
          {% endif %}

      #CALCULATE SOLAR ENERGY TO ADD OR REMOVE IN BATTERY
      - name: "sem_battery_solar_delta"
        unit_of_measurement: "kWh"
        state: >
          {% set solar = states('input_number.sem_battery_solar_kwh') | float(0) %}
          {% set grid = states('input_number.sem_battery_grid_kwh') | float(0) %}
          {% set charge_solar = states('sensor.sem_battery_charge_solar_quarter') | float(0) %}
          {% set discharge = states('sensor.sem_battery_discharge_quarter') | float(0) %}
          {% set total = solar + grid %}
          {% if total > 0 %}
            {{ charge_solar - discharge * (solar / total) }}
          {% else %}
            {{ charge_solar }}
          {% endif %}

      #CALCULATE GRID ENERGY TO ADD OR REMOVE IN BATTERY
      - name: "sem_battery_grid_delta"
        unit_of_measurement: "kWh"
        state: >
          {% set solar = states('input_number.sem_battery_solar_kwh') | float(0) %}
          {% set grid = states('input_number.sem_battery_grid_kwh') | float(0) %}
          {% set charge_grid = states('sensor.sem_battery_charge_grid_quarter') | float(0) %}
          {% set discharge = states('sensor.sem_battery_discharge_quarter') | float(0) %}
          {% set total = solar + grid %}
          {% if total > 0 %}
            {{ charge_grid - discharge * (grid / total) }}
          {% else %}
            {{ charge_grid }}
          {% endif %}

      # CHARGED VALUE 1A
      - name: "sem_charge_1a"
        unit_of_measurement: "kWh"
        state: >
          {% set start = states('input_number.grid_charge_start_1a') | float(0) %}
          {% set end   = states('input_number.grid_charge_stop_1a') | float(0) %}
          {% set charged_kwh = end - start %}
          {{ charged_kwh | round(2) }}

      # CHARGED VALUE 2
      - name: "sem_charge_2"
        unit_of_measurement: "kWh"
        state: >
          {% set start = states('input_number.grid_charge_start_2') | float(0) %}
          {% set end   = states('input_number.grid_charge_stop_2') | float(0) %}
          {% set charged_kwh = end - start %}
          {{ charged_kwh | round(2) }}

      # AVG PRICE FOR GRID ENERGY IN BATTERY
      - name: "sem_battery_avg_price"
        unit_of_measurement: "SEK/kWh"
        state: >
          {# --- Hämta laddade kWh --- #}
          {% set kwh_1 = states('sensor.sem_charge_1a') | float(0) %}
          {% set kwh_2 = states('sensor.sem_charge_2') | float(0) %}

          {# --- Hämta medelpriser för respektive fönster --- #}
          {% set price_1 = states('input_number.sem_battery_price_window_1') | float(0) %}
          {% set price_2 = states('input_number.sem_battery_price_window_2') | float(0) %}

          {# --- Total laddad energi --- #}
          {% set total_kwh = kwh_1 + kwh_2 %}

          {# --- Vägt medelpris --- #}
          {% if total_kwh > 0 %}
            {% set avg_price = (kwh_1 * price_1 + kwh_2 * price_2) / total_kwh %}
          {% else %}
            {% set avg_price = 0 %}
          {% endif %}

          {{ avg_price | round(3) }}

      # SAVING POWER BATTERY
      - name: "sem_savings_power_battery"
        unit_of_measurement: "SEK/h"
        state: >
          {% set raw = states('sensor.batteries_charge_discharge_power') | float(0) %}
          {% set unit = state_attr('sensor.batteries_charge_discharge_power', 'unit_of_measurement') | default('W') %}
          {% set battery = raw / 1000 if unit == 'W' else raw %}

          {% set house = states('sensor.sem_house_power') | float(0) %}

          {# Endast den del av batteriet som faktiskt används av huset #}
          {% set battery_discharge = -battery if battery < 0 else 0 %}
          {% set battery_discharge = [battery_discharge, house] | min %}

          {% set spot = states('sensor.sem_nordpool_active') | float(0) %}
          {% set fees = states('input_number.sem_grid_fees') | float(0) %}
          {% set price = spot + fees %}

          {% set grid_price = states('sensor.sem_battery_avg_price') | float(0) %}

          {% set solar_kwh = states('input_number.sem_battery_solar_kwh') | float(0) %}
          {% set grid_kwh  = states('input_number.sem_battery_grid_kwh') | float(0) %}
          {% set total_kwh = solar_kwh + grid_kwh %}

          {% if total_kwh > 0 %}
            {% set battery_solar = battery_discharge * (solar_kwh / total_kwh) %}
            {% set battery_grid  = battery_discharge * (grid_kwh / total_kwh) %}
          {% else %}
            {% set battery_solar = 0 %}
            % set battery_grid  = 0 %}
          {% endif %}

          {# Besparing #}
          {% set savings_solar = battery_solar * price %}
          {% set savings_grid  = battery_grid * (spot - grid_price) %}

          {% set total_savings = savings_solar + savings_grid %}

          {{ total_savings | round(2) }}

      # SAVING SOLAR POWER
      - name: "sem_savings_power_solar"
        unit_of_measurement: "SEK/h"
        state: >
          {% set raw_house = states('sensor.sem_house_power_ev') | float(0) %}
          {% set house_unit = state_attr('sensor.sem_house_power_ev', 'unit_of_measurement') | default('kW') %}
          {% set house = raw_house / 1000 if house_unit == 'W' else raw_house %}

          {# SOLAR #}
          {% set raw_solar = states('sensor.sem_input_power_with_efficiency_loss_kw') | float(0) %}
          {% set solar_unit = state_attr('sensor.sem_input_power_with_efficiency_loss_kw', 'unit_of_measurement') | default('kW') %}
          {% set solar = raw_solar / 1000 if solar_unit == 'W' else raw_solar %}

          {# BATTERY #}
          {% set raw_battery = states('sensor.batteries_charge_discharge_power') | float(0) %}
          {% set battery_unit = state_attr('sensor.batteries_charge_discharge_power', 'unit_of_measurement') | default('W') %}
          {% set battery = raw_battery / 1000 if battery_unit == 'W' else raw_battery %}

          {# PRISER #}
          {% set spot_price = states('sensor.sem_nordpool_active') | float(0) %}
          {% set fees = states('input_number.sem_grid_fees') | float(0) %}
          {% set price = spot_price + fees %}

          {# LOGIK #}
          {% set battery_charge = battery if battery > 0 else 0 %}
          {% set solar_available = solar - battery_charge %}
          {% set solar_to_house = [house, solar_available] | min if solar_available > 0 else 0 %}

          {% set savings = solar_to_house * price %}

          {{ savings | round(2) }}

      # SAVING TOTAL GRID + SOLAR
      - name: "sem_savings_power_total"
        unit_of_measurement: "SEK/h"
        state: >
          {% set solar = states('sensor.sem_savings_power_solar') | float(0) %}
          {% set battery = states('sensor.sem_savings_power_battery') | float(0) %}
          {{ (solar + battery) | round(2) }}

      #########
      #EARNINGS
      #########

      - name: "SEM Solar Export Earnings"
        unique_id: sem_solar_export_earnings
        unit_of_measurement: "SEK/h"
        device_class: monetary
        state_class: measurement
        state: >
          {# EXPORT #}
          {% set raw_export = states('sensor.sem_export_power') | float(0) %}
          {% set export_unit = state_attr('sensor.sem_export_power', 'unit_of_measurement') | default('kW') %}
          {% set export = raw_export / 1000 if export_unit == 'W' else raw_export %}
          {# PRIS #}
          {% set spot_price = states('sensor.sem_nordpool_active') | float(0) %}
          {% set addon = states('input_number.sem_export_addon') | float(0) %}
          {% set sell_price = spot_price + addon %}
          {# INTÄKT #}
          {{ (export * sell_price) | round(3) }}

      # HOUSE POWER - NO EV
      - name: "sem_house_power"
        unique_id: sem_house_power
        unit_of_measurement: "kW"
        state: >
          {# === FUNKTION FÖR ATT KONVERTERA W → kW === #}
          {% macro to_kw(entity_id) %}
            {% set value = states(entity_id) | float(0) %}
            {% set unit = state_attr(entity_id, 'unit_of_measurement') | default('') | lower %}
            {% if 'w' in unit and 'kw' not in unit %}
              {{ value / 1000 }}
            {% else %}
              {{ value }}
            {% endif %}
          {% endmacro %}

          {# === NÄTEFFEKT (Huawei integration) === #}
          {% set net_power = to_kw('sensor.power_meter_active_power') | float(0) %}
          {% set import = -net_power if net_power < 0 else 0 %}
          {% set export = net_power if net_power > 0 else 0 %}

          {# === EV-LADDNING === #}
          {% set ev_sensor_id_1 = states('input_text.sem_ev_sensor') %}
          {% set ev_sensor_id_2 = states('input_text.sem_ev_sensor_2') %}
          {% set ev_1 = to_kw(ev_sensor_id_1) | float(0) if ev_sensor_id_1 else 0 %}
          {% set ev_2 = to_kw(ev_sensor_id_2) | float(0) if ev_sensor_id_2 else 0 %}
          {% set ev = ev_1 + ev_2 %}

          {# === SOLPRODUKTION === #}
          {% set solar = to_kw('sensor.sem_input_power_with_efficiency_loss_kW') | float(0) %}

          {# === BATTERI === #}
          {% set batt = to_kw('sensor.batteries_charge_discharge_power') | float(0) %}
          {% set batt_out = -batt if batt < 0 else 0 %}
          {% set batt_in = batt if batt > 0 else 0 %}

          {# === HUSFÖRBRUKNING === #}
          {% set house_power = (solar + import + batt_out) - (export + ev + batt_in) %}

          {{ [house_power, 0] | max | round(2) }}

      # HOUSE POWER - INCLUDING EV
      - name: "sem_house_power_ev"
        unique_id: sem_house_power_ev
        unit_of_measurement: "kW"
        state: >
          {# === FUNKTION FÖR ATT KONVERTERA W → kW === #}
          {% macro to_kw(entity_id) %}
            {% set value = states(entity_id) | float(0) %}
            {% set unit = state_attr(entity_id, 'unit_of_measurement') | default('') | lower %}
            {% if 'w' in unit and 'kw' not in unit %}
              {{ value / 1000 }}
            {% else %}
              {{ value }}
            {% endif %}
          {% endmacro %}

          {# === NÄTEFFEKT (Huawei integration) === #}
          {% set net_power = to_kw('sensor.power_meter_active_power') | float(0) %}
          {% set import = -net_power if net_power < 0 else 0 %}
          {% set export = net_power if net_power > 0 else 0 %}

          {# === EV-LADDNING === #}
          {% set ev_sensor_id_1 = states('input_text.sem_ev_sensor') %}
          {% set ev_sensor_id_2 = states('input_text.sem_ev_sensor_2') %}
          {% set ev_1 = to_kw(ev_sensor_id_1) | float(0) if ev_sensor_id_1 and states(ev_sensor_id_1) not in ['unknown','unavailable',''] else 0 %}
          {% set ev_2 = to_kw(ev_sensor_id_2) | float(0) if ev_sensor_id_2 and states(ev_sensor_id_2) not in ['unknown','unavailable',''] else 0 %}
          {% set ev = ev_1 + ev_2 %}

          {# === SOLPRODUKTION === #}
          {% set solar = to_kw('sensor.sem_input_power_with_efficiency_loss_kW') | float(0) %}

          {# === BATTERI === #}
          {% set batt = to_kw('sensor.batteries_charge_discharge_power') | float(0) %}
          {% set batt_out = -batt if batt < 0 else 0 %}
          {% set batt_in = batt if batt > 0 else 0 %}

          {# === HUSFÖRBRUKNING EXKL EV (original logik) === #}
          {% set house_excl_ev = (solar + import + batt_out) - (export + ev + batt_in) %}

          {# === LÄGG TILL EV → TOTAL FÖRBRUKNING === #}
          {% set house_power = house_excl_ev + ev %}

          {{ [house_power, 0] | max | round(2) }}

      ################################ SOLAR FORECAST ####################################################

      - name: "sem_solar_forecast"
        unique_id: sem_solar_forecast
        state: "OK"
        attributes:
          sem: >
            {% set use_s2 = is_state('input_boolean.sem_solar_2', 'on') %}

            {% set s1 = state_attr('sensor.sem_solar_forecast_1', 'sem') or {} %}
            {% set s2 = state_attr('sensor.sem_solar_forecast_2', 'sem') if use_s2 else {} %}

            {% set attrs = ['watt_hours', 'watt_hours_day', 'watt_hours_period', 'watts'] %}

            {
            {% for attr in attrs %}
              "{{ attr }}": [

                {% set l1 = s1.get(attr, []) or [] %}
                {% set l2 = s2.get(attr, []) or [] %}

                {% set dates1 = l1 | map(attribute='date') | list %}
                {% set dates2 = l2 | map(attribute='date') | list %}
                {% set all_dates = (dates1 + dates2) | unique | sort %}

                {% for d in all_dates %}
                    {% set e1 = l1 | selectattr('date','equalto',d) | first %}
                    {% set e2 = l2 | selectattr('date','equalto',d) | first %}

                    {% set v1 = e1['values'] if e1 is mapping and 'values' in e1 else 0 %}
                    {% set v2 = e2['values'] if e2 is mapping and 'values' in e2 else 0 %}

                    {
                      "label": "{{ attr }}",
                      "date": "{{ d }}",
                      "values": {{ (v1 | float + v2 | float) | int }}
                    }{% if not loop.last %},{% endif %}
                {% endfor %}

              ]{% if not loop.last %},{% endif %}
            {% endfor %}
            }

      - name: "sem_solar_forecast_today"
        unique_id: sem_solar_forecast_today
        unit_of_measurement: "kWh"
        state: >
          {% set data = state_attr('sensor.sem_solar_forecast', 'sem') %}
          {% if data and 'watt_hours_day' in data %}
            {% set today = now().date().isoformat() %}
            {% set entry = data['watt_hours_day']
              | selectattr('date', 'search', today)
              | list
              | first %}
            {{ (entry['values'] / 1000) | round(2) if entry else 0 }}
          {% else %}
            0
          {% endif %}

      ################################################## UI ##############################################
      # SHOW CHARGE DECISION 1A TO 2
      - name: "sem_charge_decision_1A"
        state: >
          {% set val = state_attr('sensor.sem_battery_charge_energy_1a_2', 'should_charge') %}

          {% if val in [true, 'true', 'True'] %}
            Laddning planerad
          {% elif val in [false, 'false', 'False'] %}
            Ingen laddning
          {% else %}
            Okänt.
          {% endif %}

      # SHOW CHARGE DECISION 2 TO 1B
      - name: "sem_charge_decision_2"
        state: >
          {% set val = state_attr('sensor.sem_battery_charge_energy_2_1b', 'should_charge') %}

          {% if val in [true, 'true', 'True'] %}
            Laddning planerad
          {% elif val in [false, 'false', 'False'] %}
            Ingen laddning
          {% else %}
            Okänt.
          {% endif %}

      # TRANSLATES WORKING MODE TO SWEDISH
      - name: "sem_battery_mode"
        unique_id: sem_battery_mode
        state: >
          {% set mode = states('select.batteries_working_mode') %}
          {% if mode == 'adaptive' %}
            Adaptiv
          {% elif mode == 'fixed_charge_discharge' %}
            Fast
          {% elif mode == 'maximise_self_consumption' %}
            Självförsörjning
          {% elif mode == 'fully_fed_to_grid' %}
            Export
          {% elif mode == 'time_of_use_luna2000' %}
            Import
          {% else %}
            Okänt läge
          {% endif %}

      # CHANGE CHARGING CARD IN UI
      - name: "sem_battery_charging_interval_next"
        unique_id: sem_battery_charging_interval_next
        state: >
          {% set now_dt = now() %}
          {% set raw_1a = states('sensor.sem_battery_charge_window_cheapest_1a') %}
          {% set raw_2  = states('sensor.sem_battery_charge_window_cheapest_2') %}

          {% set start_1a, end_1a = (raw_1a.split(' - ') if (raw_1a is string and ' - ' in raw_1a) else [none, none]) %}
          {% set start_2,  end_2  = (raw_2.split(' - ')  if (raw_2 is string and ' - ' in raw_2)  else [none, none]) %}

          {% set dt_start_1a = as_datetime(start_1a) if start_1a else none %}
          {% set dt_end_1a   = as_datetime(end_1a)   if end_1a   else none %}
          {% set dt_start_2  = as_datetime(start_2)  if start_2  else none %}
          {% set dt_end_2    = as_datetime(end_2)    if end_2    else none %}

          {% set upcoming = [] %}
          {% if dt_end_1a and dt_end_1a > now_dt %}
                    {% set sort_key = dt_start_1a if (dt_start_1a and dt_start_1a > now_dt) else now_dt %}
                    {% set upcoming = upcoming + [{'name':'1a','sort': sort_key}] %}
          {% endif %}
          {% if dt_end_2 and dt_end_2 > now_dt %}
                    {% set sort_key = dt_start_2 if (dt_start_2 and dt_start_2 > now_dt) else now_dt %}
                    {% set upcoming = upcoming + [{'name':'2','sort': sort_key}] %}
          {% endif %}

          {# Välj närmast (min sort) #}
          {% set sorted_upcoming = upcoming | sort(attribute='sort') %}
          {% set next = sorted_upcoming[0] if sorted_upcoming else none %}

          {% if next and next['name'] == '1a' %}
                    1
          {% else %}
                    2
          {% endif %}

      ################################ SMART LOGIC ####################################################

      # CALCULATES EXPORT THRESHOLD
      - name: sem_export_price_threshold
        unique_id: sem_export_price_threshold
        unit_of_measurement: "kr/kWh"
        state: >
          {% set solar =
            states('input_number.sem_battery_solar_kwh') | float(0) %}
          {% set grid =
            states('input_number.sem_battery_grid_kwh') | float(0) %}
          {% set grid_price =
            states('sensor.sem_battery_avg_price') | float(0) %}
          {% set wear_cost =
            states('input_number.sem_battery_wear_cost') | float(0) %}
          {% set profit_margin =
            states('input_number.sem_export_profit_margin') | float(0) %}
          {% set total = solar + grid %}
          {% if total > 0 %}
            {% set real_energy_cost =
              (grid * grid_price) / total %}
          {% else %}
            {% set real_energy_cost = 0 %}
          {% endif %}
          {{
            (
              real_energy_cost
              + wear_cost
              + profit_margin
            ) | round(3)
          }}
        attributes:
          real_energy_cost: >
            {% set solar =
              states('input_number.sem_battery_solar_kwh') | float(0) %}
            {% set grid =
              states('input_number.sem_battery_grid_kwh') | float(0) %}
            {% set grid_price =
              states('sensor.sem_battery_avg_price') | float(0) %}
            {% set total = solar + grid %}
            {% if total > 0 %}
              {{ ((grid * grid_price) / total) | round(3) }}
            {% else %}
              0
            {% endif %}
          solar_kwh: >
            {{ states('input_number.sem_battery_solar_kwh') }}
          grid_kwh: >
            {{ states('input_number.sem_battery_grid_kwh') }}
          total_kwh: >
            {{
              (
                states('input_number.sem_battery_solar_kwh') | float(0)
                +
                states('input_number.sem_battery_grid_kwh') | float(0)
              ) | round(2)
            }}
          usable_capacity: >
            {{
              state_attr(
                'sensor.sem_battery_charge_energy_1a_2',
                'usable_capacity'
              )
            }}
          wear_cost: >
            {{ states('input_number.sem_battery_wear_cost') }}
          profit_margin: >
            {{ states('input_number.sem_export_profit_margin') }}

      # CALCULATE SURPLUS ENERGY
      - name: sem_available_export_energy_1
        unique_id: sem_available_export_energy_1
        unit_of_measurement: "kWh"
        state: >
          {% set battery_kwh = state_attr('sensor.sem_available_export_energy_1','battery_kwh') | float(0) %}
          {% set future_house_energy_need = state_attr('sensor.sem_available_export_energy_1','future_house_energy_need') | float(0) %}
          {% set future_solar_surplus = state_attr('sensor.sem_available_export_energy_1','future_solar_surplus') | float(0) %}
          {% set reserved_energy_for_peak_period = state_attr('sensor.sem_relative_expensive_price_1','kwh_required') | float(0) %}
          {% set battery_reserve = states('input_number.sem_battery_export_reserve') | float(1) %}
          {% set available = battery_kwh - future_house_energy_need - reserved_energy_for_peak_period - battery_reserve %}
          {{ [available, 0] | max | round(2) }}
        attributes:
          export_window: >
            {{ states('sensor.sem_export_window_1') }}
          peak_price: >
            {{ state_attr('sensor.sem_export_window_1','peak_price') | float(0) }}
          peak_hour: >
            {{ state_attr('sensor.sem_export_window_1','peak_hour') | float(0) }}
          avg_price: >
            {{ state_attr('sensor.sem_export_window_1','avg_price') | float(0) }}
          required_export_price: >
            {{ (
              states('input_number.sem_battery_wear_cost')|float(0) +
              states('input_number.sem_export_profit_margin')|float(0)
            ) | round(2) }}
          battery_soc: >
            {{ states('sensor.batteries_state_of_capacity') | float(0) }}
          usable_capacity: >
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','usable_capacity') | float(0) }}
          battery_kwh: >
            {% set soc = states('sensor.batteries_state_of_capacity') | float(0) %}
            {% set usable_capacity = state_attr('sensor.sem_battery_charge_energy_1a_2','usable_capacity') | float(0) %}
            {{ ((soc / 100) * usable_capacity) | round(2) }}
          future_house_energy_need: >
            {% set w1 = states('sensor.sem_export_window_1') %}
            {% set w2 = states('sensor.sem_battery_charge_window_cheapest_1a') %}
            {% if ' - ' not in w1 or ' - ' not in w2 %}
              0
            {% else %}
              {% set start = as_datetime(w1.split(' - ')[1]) %}
              {% set end = as_datetime(w2.split(' - ')[0]) %}
              {% set k_morning = states('sensor.sem_energy_avg_morning') | float(0) %}
              {% set k_day = states('sensor.sem_energy_avg_day') | float(0) %}
              {% set k_evening = states('sensor.sem_energy_avg_evening') | float(0) %}
              {% set k_night = states('sensor.sem_energy_avg_night') | float(0) %}
              {% set forecast_raw = state_attr('sensor.sem_solar_forecast','sem') %}
              {% set forecast = forecast_raw if forecast_raw is mapping else {} %}
              {% set wp = forecast.get('watt_hours_period', []) %}
              {% set sol_factor = state_attr('sensor.sem_battery_charge_energy_2_1b','adjustment_factor_solar_energy') | float(1) %}
              {% set sol_map = namespace(data={}) %}
              {% for e in wp %}
                {% if e is mapping %}
                  {% set d = e.get('date') %}
                  {% set v = e.get('values') %}
                  {% if d is not none and v is not none %}
                    {% set dt = as_datetime(d) %}
                    {% set ts_hour = dt.replace(minute=0, second=0, microsecond=0) %}
                    {% set kwh = (v | float / 1000) * sol_factor %}
                    {% set sol_map.data = dict(sol_map.data, **{ts_hour|string: kwh}) %}
                  {% endif %}
                {% endif %}
              {% endfor %}
              {% set ns = namespace(current=start, total=0) %}
              {% for i in range(0,72) %}
                {% if ns.current >= end %}
                  {% break %}
                {% endif %}
                {% set h = ns.current.hour %}
                {% set ts_key = ns.current.replace(minute=0, second=0, microsecond=0) | string %}
                {% if 5 <= h < 10 %}
                  {% set need = k_morning %}
                {% elif 10 <= h < 15 %}
                  {% set need = k_day %}
                {% elif 15 <= h < 21 %}
                  {% set need = k_evening %}
                {% else %}
                  {% set need = k_night %}
                {% endif %}
                {% set sol = sol_map.data.get(ts_key, 0) %}
                {% set house_deficit = [need - sol, 0] | max %}
                {% set ns.total = ns.total + house_deficit %}
                {% set ns.current = ns.current + timedelta(hours=1) %}
              {% endfor %}
              {{ ns.total | round(2) }}
            {% endif %}
          future_solar_surplus: >
            {% set w1 = states('sensor.sem_export_window_1') %}
            {% set w2 = states('sensor.sem_battery_charge_window_cheapest_1a') %}
            {% if ' - ' not in w1 or ' - ' not in w2 %}
              0
            {% else %}
              {% set start = as_datetime(w1.split(' - ')[1]) %}
              {% set end = as_datetime(w2.split(' - ')[0]) %}
              {% set k_morning = states('sensor.sem_energy_avg_morning') | float(0) %}
              {% set k_day = states('sensor.sem_energy_avg_day') | float(0) %}
              {% set k_evening = states('sensor.sem_energy_avg_evening') | float(0) %}
              {% set k_night = states('sensor.sem_energy_avg_night') | float(0) %}
              {% set forecast_raw = state_attr('sensor.sem_solar_forecast','sem') %}
