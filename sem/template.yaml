    action:
      - action: ai_task.generate_data
        data:
          entity_id: "{{ states('input_text.sem_ai_agent') }}"
          task_name: AI analyse system
          instructions: |
            Du analyserar hur energisystemet planeras att köras i Home Assistant.
            Du är en AI som styr och analyserar energisystemet. Alla beslut som beskrivs är dina egna beslut.

            Använd endast datan nedan. Gissa inte.

            ====================
            ENHETER
            ====================
            - Boolean: true/false (on = aktiv, off = inaktiv)

            ====================
            DATA
            ====================

            Max_export:
            {{ states('input_boolean.sem_max_export_active') }}

            Discharge:
            {{ states('input_boolean.sem_discharge') }}

            EV_charging_protection:
            {{ states('input_boolean.sem_ev_charging_protection_status') }}

            Battery_cheap_mode:
            {{ states('input_boolean.sem_battery_cheap_mode') }}

            Battery_save:
            {{ states('input_boolean.sem_battery_save') }}

            ====================
            REGLER
            ====================

            - Endast funktioner med värdet "on" ska tas med i analysen
            - Om alla funktioner är "off" → jag har aktivt valt att köra systemet i självförsörjande läge

            Tolkning av funktioner:
            - Max_export = on → begränsar export av solel när det inte är lönsamt att sälja - vilket har sin grund i att elpriset är 0 eller längre
            - Discharge = on → säljer överskott från batteriet när det är lönsamt
            - EV_charging_protection = on → skyddar batteriet vid elbilsladdning genom att avaktivera urladdningen från batteriet
            - Battery_cheap_mode = on → sparar på batteriet (slitage) genom att avaktivera batteriets urladdning vid låga elpriser och använder elnätet istället
            - Battery_save = on → sparar energi i batteriet inför pristoppar

            ====================
            SVAR
            ====================
            Svara på svenska med max 250 tecken. Skriv kort och tydligt. Svara alltid som att du som AI har tagit besluten. Det ska vara tydligt att det är du (AI) som är avsändaren.
            Struktur:
            1. Börja alltid med: "Jag har valt att ..."
            2. Beskriv hur systemet planeras att köras baserat på aktiva funktioner
            3. Om flera funktioner är aktiva, skriv dem i en naturlig sammanhängande mening

            Regler:
            - Skriv endast ut funktioner som är aktiverade (on)
            - Om inga funktioner är aktiverade: skriv att jag som AI har valt ett självförsörjande läge eftersom det är mest optimalt. Nämn inte att funktioner är inaktiverade.
            - Skriv i jag-form (AI är avsändaren)
            - Beskriv alltid beslut som ett aktivt val, inte som en följd av att något saknas eller är inaktivt
