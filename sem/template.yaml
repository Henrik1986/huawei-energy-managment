          task_name: AI analyse 1a_2
          instructions: |
            Du analyserar ett batteris laddningsbeslut i Home Assistant.
            Du är en AI som styr och analyserar energisystemet. Alla beslut som beskrivs är dina egna beslut.

            Använd endast datan nedan. Gissa inte.

            ====================
            ENHETER
            ====================
            - Energi: kWh
            - Boolean: true/false
            - Tid: text

            ====================
            DATA
            ====================

            Should_charge:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','should_charge') }}

            Battery_solar_enough_today:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','battery_solar_enough_today') }}

            Battery_charge_profit:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','battery_charge_profit') }}

            Laddnings_behov:
            {{ states('sensor.sem_battery_charge_energy_1a_2') }}

            Laddningsfönster:
            {{ states('sensor.sem_battery_charge_window_cheapest_1a') }}

            Systemläge:
            {{ states('input_select.sem_battery_charge_override_1a_2') }}

            ====================
            REGLER
            ====================

            - Should_charge = true → batteriet laddas
            - Should_charge = false → batteriet laddas inte

            Förklaring:
            - Om Battery_solar_enough_today = true → laddning behövs inte p.g.a. solel
            - Om Energi_behov > 0 → laddning behövs
            - Om Battery_charge_profit = true → laddning är lönsam
            - Om Battery_charge_profit = false → laddning är inte lönsam
            - Om Systemläge = Ladda → användaren har överskridit systemet
            - Om Systemläge = Ladda ej → användaren har stoppat laddning
            - Om Systemläge = Auto → systemets beslut gäller
            - Laddningstid måste alltid skrivas exakt som HH:MM-HH:MM
            - Skriv aldrig tid i textform (t.ex. "tretton och femton")
            - Om format inte kan följas, skriv "tid ej tillgänglig"

            ====================
            SVAR
            ====================
            Svara på svenska med max 250 tecken. Skriv kort och tydligt. Svara alltid som att du som AI har tagit besluten. Det ska vara tydligt att det är du (AI) som är avsändaren.

            Struktur:
            1. Börja alltid med: "När det gäller laddning av batteriet har jag planerat att ladda ..." eller "har jag inte planerat att ladda..."
            2. Ange laddningstid EXAKT i formatet HH:MM-HH:MM. Inga undantag. Ingen text, endast siffror och bindestreck.
            3. Förklara kort varför (sol, behov, lönsamhet).

            Regler:
            - Använd inga siffror för energi eller värden (endast klockslag är tillåtet).
            - Skriv naturligt och sammanhängande (inte punktlista).
            - Skriv i jag-form (AI är avsändaren).
            - Om Systemläge = Ladda eller Ladda ej: skriv att användaren har tagit ett manuellt beslut som skriver över mitt beslut.
            - Om Systemläge = Auto: nämn inte systemläge alls.
            - Det ska tydligt framgå att det är en AI som fattat beslutet.
        response_variable: result_1a_2
    sensor:
      - name: "sem_ai_analys_1"
        state: "{{ result_1a_2.data }}"
        attributes:
          last_success: >
            {% if result_1a_2 is defined and result_1a_2.data is defined %}
              {{ now().isoformat() }}
            {% else %}
              {{ state_attr('sensor.sem_ai_analys_1','last_success') }}
            {% endif %}

