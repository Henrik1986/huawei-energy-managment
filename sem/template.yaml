  # WEATHER FORCECAST HOURLY
  - trigger:
      - trigger: time_pattern
        minutes: "/5"
      - trigger: homeassistant
        event: start
    action:
      - variables:
          weather_entity: "{{ states('input_text.sem_weather_sensor') }}"
      - action: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: "{{weather_entity}}"
        response_variable: weather_home_hourly
    sensor:
      - name: "sem_weather_forecasts_hourly"
        state: "{{ states(weather_entity) }}"
        attributes:
          forecast: "{{ weather_home_hourly[weather_entity].forecast }}"

  # AI ANALYS 1A_2
  - trigger:
      - trigger: time_pattern
        minutes: "/30"
    condition:
      - condition: time
        after: "23:00:00"
        before: "14:00:00"
      - condition: template
        value_template: >
          {% set last = state_attr('sensor.sem_ai_analys_1','last_success') %}
          {% if last in [none, 'unknown', 'unavailable'] %}
            true
          {% else %}
            {{ (now() - as_datetime(last)).total_seconds() > 1700 }}
          {% endif %}
    action:
      - action: ai_task.generate_data
        data:
          entity_id: "{{ states('input_text.sem_ai_agent') }}"
          task_name: AI analyse 1a_2
          instructions: |
            Du analyserar ett batteris laddningsbeslut i Home Assistant.
            Du är en AI som styr och analyserar energisystemet. Alla beslut som beskrivs är dina egna beslut.

            Använd endast datan nedan. Gissa inte.

            ====================
            ENHETER
            ====================

            - Energi: kWh
            - Boolean: true/false
            - Tid: HH:MM-HH:MM

            ====================
            DATA
            ====================

            Laddning tillåten:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','should_charge') }}

            Solen räcker idag:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','battery_solar_enough_today') }}

            Lönsam laddning:
            {{ state_attr('sensor.sem_battery_charge_energy_1a_2','battery_charge_profit') }}

            Laddningsbehov:
            {{ states('sensor.sem_battery_charge_energy_1a_2') }}

            Laddningsfönster:
            {{ states('sensor.sem_battery_charge_window_cheapest_1a') }}

            Systemläge:
            {{ states('input_select.sem_battery_charge_override_1a_2') }}

            ====================
            VIKTIGT
            ====================

            - "Laddning tillåten" är det slutgiltiga AI-beslutet.
            - Övriga sensorer används endast för att motivera beslutet.
            - Om "Laddning tillåten = true" får svaret aldrig säga att laddning inte planeras.
            - Om "Laddning tillåten = false" får svaret aldrig säga att laddning planeras.
            - Systemläge kan manuellt överskrida AI-beslutet.

            ====================
            TOLKNING AV DATA
            ====================

            - Om Laddningsbehov > 0:
              → det finns ett laddningsbehov

            - Om Laddningsbehov <= 0:
              → det finns inget laddningsbehov

            - Om Lönsam laddning = true:
              → det är lönsamt att ladda batteriet

            - Om Lönsam laddning = false:
              → det är inte lönsamt att ladda batteriet

            - Om Solen räcker idag = true:
              → solproduktionen räcker för batteriet

            - Om Solen räcker idag = false:
              → solproduktionen räcker inte för batteriet

            - Om Laddning tillåten = true:
              → jag som AI har beslutat att laddning ska genomföras

            - Om Laddning tillåten = false:
              → jag som AI har beslutat att laddning inte ska genomföras

            ====================
            REGLER (PRIORITERINGSORDNING)
            ====================

            1. SYSTEMLÄGE HAR HÖGST PRIORITET

            - Om Systemläge = "Ladda":
              → användaren har manuellt överskridit mitt AI-beslut och valt att batteriet ska laddas

            - Om Systemläge = "Ladda ej":
              → användaren har manuellt överskridit mitt AI-beslut och valt att batteriet inte ska laddas

            - Om Systemläge = "Auto":
              → mitt AI-beslut gäller

            2. AI-BESLUT AVGÖRS AV LADDNING TILLÅTEN

            - Om Laddning tillåten = true:
              → laddning är planerad

            - Om Laddning tillåten = false:
              → laddning är inte planerad

            3. LADDNINGSTID

            - Laddningstid måste alltid skrivas exakt som:
              HH:MM-HH:MM

            - Inga andra tidsformat får användas

            - Om laddning är planerad:
              - använd exakt värde från Laddningsfönster
              - om värdet är tomt, null, unknown eller ogiltigt:
                → skriv "tid ej tillgänglig"

            - Om laddning inte är planerad:
              → skriv aldrig något tidsintervall

            ====================
            REGLER FÖR FÖRKLARING
            ====================

            - Laddning tillåten är det slutgiltiga AI-beslutet.

            - Om Laddning tillåten = true:
              → jag har beslutat att laddning ska genomföras
              → förklaringen måste stödja detta beslut
              → om det finns laddningsbehov:
                förklara att batteriet behöver laddas
              → om laddning är lönsam:
                förklara att laddning är ekonomiskt fördelaktig
              → om solproduktionen inte räcker:
                förklara att nätladdning behövs

            - Om Laddning tillåten = false:
              → jag har beslutat att laddning inte ska genomföras

            - Om det inte finns laddningsbehov:
              → förklara att batteriet inte behöver laddas

            - Om solproduktionen räcker:
              → förklara att solproduktionen bedöms täcka behovet

            - Om laddning inte är lönsam:
              → förklara att laddning inte är ekonomiskt fördelaktig

            - Om användaren manuellt stoppat laddning:
              → förklara att användaren har överskridit mitt AI-beslut

            - Om användaren manuellt tvingat laddning:
              → förklara att användaren har överskridit mitt AI-beslut

            ====================
            SVAR
            ====================

            Svara på svenska med max 250 tecken.

            Skriv kort, tydligt och konsekvent.

            ====================
            SVARSSTRUKTUR (MÅSTE FÖLJAS)
            ====================

            1. Börja alltid med exakt EN av dessa meningar:

            - "När det gäller laddning av batteriet har jag planerat att ladda ..."
            - "När det gäller laddning av batteriet har jag inte planerat att ladda batteriet."

            2. Om laddning är planerad:
            - ange laddningstid exakt som HH:MM-HH:MM

            3. Avsluta med en kort förklaring baserad ENDAST på:
            - laddningsbehov
            - lönsamhet
            - solproduktion
            - AI-beslut
            - manuellt override

            ====================
            REGLER FÖR TEXTEN
            ====================

            - Använd inga energisiffror
            - Endast tid får innehålla siffror
            - Skriv alltid i jag-form
            - Det ska tydligt framgå att beslutet kommer från mig som AI
            - Ingen punktlista
            - Endast sammanhängande text
            - Ingen extra text före eller efter svaret
            - Ingen metaforik eller mänskliga uttryck
            - Ingen egen tolkning utanför datan

            - Om Systemläge = Auto:
              → nämn inte systemläget

            - Om användaren gjort manuellt override:
              → skriv tydligt att användaren har överskridit mitt AI-beslut

            - Om laddning inte är planerad:
              → orsaken måste framgå tydligt
        response_variable: result_1a_2
    sensor:
      - name: "sem_ai_analys_1"
        state: "{{ result_1a_2.data }}"
        attributes:
          last_success: >
            {% if result_1a_2 is defined and result_1a_2.data is defined %}
              {{ now().isoformat() }}
            {% else %}
              {{ state_attr('sensor.sem_ai_analys_1','last_success') }}
            {% endif %}

