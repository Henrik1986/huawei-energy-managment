  # AI ANALYS SYSTEM
  - trigger:
      - trigger: time_pattern
        minutes: "/30"
    condition:
      - condition: time
        after: "04:00:00"
        before: "23:00:00"
      - condition: template
        value_template: >
          {% set last = state_attr('sensor.sem_ai_analys_system','last_success') %}
          {% if last in [none, 'unknown', 'unavailable'] %}
            true
          {% else %}
            {{ (now() - as_datetime(last)).total_seconds() > 1700 }}
          {% endif %}
    action:
      - action: ai_task.generate_data
        data:
          entity_id: "{{ states('input_text.sem_ai_agent') }}"
          task_name: AI analyse system
          instructions: |
            Du analyserar hur energisystemet planeras att köras i Home Assistant.
            Du är en AI som styr och analyserar energisystemet. Alla beslut som beskrivs är dina egna beslut.

            Använd endast datan nedan. Gissa inte.

            ====================
            ENHETER
            ====================
            - Boolean: true/false (on = aktiv, off = inaktiv)

            ====================
            DATA
            ====================

            Max_export:
            {{ states('input_boolean.sem_max_export_active') }}

            Discharge:
            {{ states('input_boolean.sem_discharge') }}

            EV_charging_protection:
            {{ states('input_boolean.sem_ev_charging_protection_status') }}

            Battery_cheap_mode:
            {{ states('input_boolean.sem_battery_cheap_mode') }}

            Battery_save:
            {{ states('input_boolean.sem_battery_save') }}

            ====================
            REGLER
            ====================

            - Endast funktioner med värdet "on" ska tas med i analysen
            - Om alla funktioner är "off" → jag har aktivt valt att köra systemet i självförsörjande läge

            Tolkning av funktioner:
            - Max_export = on → begränsar export av solel när det inte är lönsamt att sälja - vilket har sin grund i att elpriset är 0 eller längre
            - Discharge = on → säljer överskott från batteriet när det är lönsamt
            - EV_charging_protection = on → skyddar batteriet vid elbilsladdning genom att avaktivera urladdningen från batteriet
            - Battery_cheap_mode = on → sparar på batteriet (slitage) genom att avaktivera batteriets urladdning vid låga elpriser och använder elnätet istället
            - Battery_save = on → sparar energi i batteriet inför pristoppar

            ====================
            SVAR
            ====================
            Svara på svenska med max 250 tecken. Skriv kort och tydligt. Svara alltid som att du som AI har tagit besluten. Det ska vara tydligt att det är du (AI) som är avsändaren.
            Struktur:
            1. Börja alltid med: "Jag har valt att ..."
            2. Beskriv hur systemet planeras att köras baserat på aktiva funktioner
            3. Om flera funktioner är aktiva, skriv dem i en naturlig sammanhängande mening

            Regler:
            - Skriv endast ut funktioner som är aktiverade (on)
            - Om inga funktioner är aktiverade: skriv att jag som AI har valt ett självförsörjande läge eftersom det är mest optimalt. Nämn inte att funktioner är inaktiverade.
            - Skriv i jag-form (AI är avsändaren)
            - Beskriv alltid beslut som ett aktivt val, inte som en följd av att något saknas eller är inaktivt
            - Skriv naturligt och sammanhängande (inte punktlista)
            - Använd inga tekniska entity-namn i svaret
            - Undvik siffror
            - Det ska tydligt framgå att det är en AI som fattat beslutet
        response_variable: result_system
    sensor:
      - name: "sem_ai_analys_system"
        state: "{{ result_system.data }}"
        attributes:
          last_success: >
            {% if result_system is defined and result_system.data is defined %}
              {{ now().isoformat() }}
            {% else %}
              {{ state_attr('sensor.sem_ai_analys_system','last_success') }}
            {% endif %}

  # STORE LOWEST TEMP
  - trigger:
      - trigger: time
        at: "00:03:00"
    sensor:
      - name: "sem_temp_low"
        state: >
          {# Hämta dagens lägsta temperatur från SMHI #}
          {% set forecast = state_attr('sensor.sem_weather_forecasts_hourly', 'forecast') %}
          {% if forecast %}
            {% set today_low = forecast | map(attribute='templow') | map('float') | min %}
            {{ today_low }}
          {% else %}
            {{ states('sensor.sem_temp_low') }}
          {% endif %}
        attributes:
          today: >
            {% set forecast = state_attr('sensor.sem_weather_forecasts_hourly', 'forecast') %}
            {% if forecast %}
              {{ forecast | map(attribute='templow') | map('float') | min }}
            {% else %}
              {{ states('sensor.sem_temp_low') }}
            {% endif %}
          yesterday: >
            {% set yesterday = state_attr('sensor.sem_temp_low', 'today') %}
            {{ yesterday if yesterday is not none else 0 }}
          day_before_yesterday: >
            {% set db_yesterday = state_attr('sensor.sem_temp_low', 'yesterday') %}
            {{ db_yesterday if db_yesterday is not none else 0 }}
          three_days_ago: >
            {% set three_days_ago = state_attr('sensor.sem_temp_low', 'day_before_yesterday') %}
            {{ three_days_ago if three_days_ago is not none else 0 }}
          source: sensor.sem_weather_forecasts_hourly

  #CHECKS IF ELECTRIC PRICES ARE AVALIBLE
  - binary_sensor:
      - name: "sem_nordpool_tomorrow_prices_available"
        unique_id: "sem_nordpool_tomorrow_prices_available"
        state: >
          {% if is_state('input_boolean.sem_use_official_nordpool', 'on') %}
            {{ state_attr('sensor.sem_nordpool_sensor_official', 'tomorrow_valid') == true }}
          {% else %}
            {% set sensor_id = states('input_text.sem_nordpool_sensor_inofficial') %}
            {% if sensor_id %}
              {{ state_attr(sensor_id, 'tomorrow_valid') == true }}
            {% else %}
              false
            {% endif %}
          {% endif %}

      #CHECKS IF SENSORS ARE AVALIBLE
      - name: sem_huawei_sensor_available_control
        state: >
          {% set entities = [
            'sensor.batteries_state_of_capacity',
            'input_number.sem_batteries_end_of_discharge_soc',
            'sensor.inverter_input_power',
            'sensor.power_meter_active_power',
            'sensor.batteries_charge_discharge_power',
            'select.batteries_working_mode'
          ] %}
          {{ entities
              | map('states')
              | reject('in', ['unavailable', 'unknown'])
              | list
              | length == entities | length }}
