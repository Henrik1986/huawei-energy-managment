          {# Dra sedan bort energi som redan finns i batteriet #}
          {% set charge_needed = capped_total - battery_capacity %}

          {# Tillåt aldrig negativt värde #}
          {% set charge_needed = [charge_needed, 0] | max %}

          {{ charge_needed | round(2) }}
