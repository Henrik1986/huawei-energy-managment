sensor:
  # FOR CALCULATION OF CHARGE
  - platform: integration
    name: "sem_house_power_tot"  
    source: sensor.sem_house_power
    round: 2
    method: left

  # SOLAR KWH
  - platform: integration
    name: "sem_input_power_with_efficiency_loss_kW_tot"
    source: sensor.sem_input_power_with_efficiency_loss_kW
    round: 2
    method: trapezoidal
  
  # EV KWH
  - platform: integration
    name: "sem_ev_sensor_power_tot"
    source: sensor.sem_ev_sensor_power
    round: 2
    method: left

  # IMPORT KWH
  - platform: integration
    name: "sem_import_power_tot"
    source: sensor.sem_import_power
    round: 2
    method: left

  # EXPORT KWH
  - platform: integration
    name: "sem_export_power_tot"
    source: sensor.sem_export_power
    round: 2
    method: left

  # BATTERY DISCHARGE KWH
  - platform: integration
    source: sensor.sem_battery_discharge_power
    name: sem_battery_discharge_energy
    round: 3
    method: left

  # BATTERY CHARGE KWH
  - platform: integration
    source: sensor.sem_battery_charge_power
    name: sem_battery_charge_energy
    round: 3
    method: left

  # BATTERY CHARGE FROM GRID KWH
  - platform: integration
    source: sensor.sem_battery_charge_from_grid_power
    name: sem_battery_charge_from_grid_energy
    round: 3
    method: left

  # BATTERY CHARGE FROM SOLAR KWH
  - platform: integration
    source: sensor.sem_battery_charge_from_solar_power
    name: sem_battery_charge_from_solar_energy
    round: 3
    method: left
  
  # SOLAR ENERGI TO HOUSE KWH
  - platform: integration
    source: sensor.sem_solar_to_house_power
    name: sem_solar_to_house_energy
    round: 3
    method: left

  # TOTAL SAVINGS SEK
  - platform: integration
    name: sem_savings_total
    unique_id: sem_savings_total
    source: sensor.sem_savings_power_total
    round: 2
    method: trapezoidal

